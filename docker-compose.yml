version: '3.8'

services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongo:27017/tenandsee
      - JWT_SECRET=change_this_in_production
    depends_on:
      - mongo
    restart: unless-stopped
    volumes:
      - ./frontend:/app/frontend:ro

  mongo:
    image: mongo:6-jammy
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:

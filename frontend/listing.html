<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="preconnect" href="https://api.mapbox.com">
    <link rel="dns-prefetch" href="https://images.unsplash.com">
    <title>Room Details — Ten&See</title>
    <meta name="description" content="View student room details on Ten&See — photos, price, amenities and location near your university in Malaysia. Chat with our assistant and book a viewing.">
    <link rel="canonical" href="https://tenandsee.homes/listing.html">
    <meta property="og:type" content="product">
    <meta property="og:site_name" content="Ten&See">
    <meta property="og:title" content="Room Details — Ten&See">
    <meta property="og:description" content="Photos, price, amenities and location for verified student rooms near Malaysian universities.">
    <meta property="og:url" content="https://tenandsee.homes/listing.html">
    <meta property="og:image" content="https://tenandsee.homes/assets/logo.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Room Details — Ten&See">
    <meta name="twitter:description" content="Photos, price, amenities and location for verified student rooms.">
    <meta name="twitter:image" content="https://tenandsee.homes/assets/logo.png">
    <link rel="icon" type="image/png" href="/assets/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/theme.js"></script>
    <link rel="stylesheet" href="/theme.css">
    <link rel="stylesheet" href="/cookie-consent.css">
    <link rel="stylesheet" href="/map-feature.css">
    <script src="/api/config.js"></script>
    <script src="/map-feature.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--color-bg); color: var(--color-text-main); line-height: 1.6; }
        h1,h2,h3,h4 { font-family: 'Space Grotesk', sans-serif; }

        /* Navbar */
        .navbar {
            position: fixed; top: 0; left: 0; right: 0;
            z-index: 1000; padding: 1rem 2rem;
            background: var(--color-primary);
        }
        .nav-container {
            max-width: 1400px; margin: 0 auto;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo { text-decoration: none; display: inline-flex; align-items: center; }
        .logo img { width: 64px; height: 64px; object-fit: contain; display: block; border-radius: 0; background: transparent; }
        .logo-text { font-family: 'Space Grotesk', sans-serif; font-size: 1.75rem; font-weight: 700; color: white; margin-left: 0.75rem; letter-spacing: -0.02em; display: flex; align-items: center; }
        .logo-text span { color: var(--color-accent); font-weight: 700; }
        .nav-back { color: rgba(255,255,255,0.7); text-decoration: none; font-size: 0.9rem; display: flex; align-items: center; gap: 0.5rem; transition: color 0.2s; }
        .nav-back:hover { color: var(--color-accent); }

        /* Layout */
        .page-wrap { max-width: 1100px; margin: 0 auto; padding: 7rem 2rem 4rem; }

        /* Breadcrumb */
        .breadcrumb { display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; color: var(--color-text-muted); margin-bottom: 1.5rem; }
        .breadcrumb a { color: var(--color-accent); text-decoration: none; }
        .breadcrumb a:hover { text-decoration: underline; }

        /* Main grid */
        .detail-grid { display: grid; grid-template-columns: 1fr 360px; gap: 2rem; align-items: start; }

        /* Gallery */
        .gallery { border-radius: 20px; overflow: hidden; margin-bottom: 2rem; background: var(--color-primary); }
        .gallery-main { position: relative; height: 400px; overflow: hidden; }
        .gallery-main img { width: 100%; height: 100%; object-fit: cover; }
        .gallery-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--color-primary), var(--color-bg)); }
        .gallery-placeholder i { font-size: 5rem; color: rgba(184,149,74,0.3); }

        /* Info block */
        .info-card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: 20px; padding: 2rem; margin-bottom: 1.5rem; }

        .listing-type-badge { display: inline-block; padding: 0.3rem 0.875rem; background: rgba(201,168,76,0.1); border-radius: 8px; font-size: 0.75rem; color: var(--color-accent); font-weight: 600; text-transform: uppercase; margin-bottom: 0.75rem; }
        .listing-title { font-size: 1.75rem; font-weight: 700; color: var(--color-text-main); margin-bottom: 0.5rem; line-height: 1.2; }
        .listing-location { display: flex; align-items: center; gap: 0.4rem; color: var(--color-text-muted); font-size: 0.95rem; margin-bottom: 1.25rem; }
        .listing-location i { color: var(--color-accent); }

        .price-block { display: flex; align-items: baseline; gap: 0.4rem; margin-bottom: 1.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--color-border); }
        .price-main { font-family: 'Space Grotesk', sans-serif; font-size: 2.25rem; font-weight: 700; color: var(--color-text-main); }
        .price-period { font-size: 1rem; color: var(--color-text-muted); }

        .stats-row { display: flex; gap: 1.5rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
        .stat-item { display: flex; align-items: center; gap: 0.5rem; font-size: 0.9rem; color: var(--color-text-muted); }
        .stat-item i { color: var(--color-accent); width: 16px; }
        .stat-item strong { color: var(--color-text-main); }

        .description-block h3 { font-size: 1rem; font-weight: 600; color: var(--color-text-main); margin-bottom: 0.75rem; }
        .description-block p { font-size: 0.95rem; color: var(--color-text-muted); line-height: 1.7; }

        /* Amenities */
        .amenities-grid { display: flex; flex-wrap: wrap; gap: 0.625rem; margin-top: 0.75rem; }
        .amenity { display: flex; align-items: center; gap: 0.4rem; padding: 0.4rem 0.875rem; background: var(--color-bg); border: 1px solid var(--color-border); border-radius: 8px; font-size: 0.85rem; color: var(--color-text-muted); }
        .amenity i { color: var(--color-accent); font-size: 0.8rem; }

        /* Availability */
        .avail-row { display: flex; justify-content: space-between; padding: 0.75rem 0; border-bottom: 1px solid var(--color-border); font-size: 0.9rem; }
        .avail-row:last-child { border-bottom: none; }
        .avail-label { color: var(--color-text-muted); }
        .avail-value { font-weight: 600; color: var(--color-text-main); }

        /* Sidebar */
        .sidebar-card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: 20px; padding: 1.75rem; margin-bottom: 1.5rem; position: sticky; top: 6rem; }
        .sidebar-price { font-family: 'Space Grotesk', sans-serif; font-size: 2rem; font-weight: 700; color: var(--color-text-main); margin-bottom: 0.25rem; }
        .sidebar-period { font-size: 0.9rem; color: var(--color-text-muted); margin-bottom: 1.5rem; }

        .btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.875rem 1.5rem; border-radius: 12px; font-weight: 600; font-size: 0.95rem; cursor: pointer; transition: all 0.2s ease; border: none; text-decoration: none; width: 100%; justify-content: center; margin-bottom: 0.75rem; font-family: inherit; }
        .btn:hover { transform: translateY(-1px); filter: brightness(1.05); }
        .btn-primary { background: var(--color-accent); color: var(--color-primary); box-shadow: 0 4px 15px rgba(201,168,74,0.3); }
        .btn-primary:hover { background: #D4B55D; box-shadow: 0 6px 20px rgba(201,168,74,0.4); }
        .btn-whatsapp { background: #25d366; color: white; }
        .btn-outline-dark { background: transparent; color: var(--color-text-main); border: 1.5px solid var(--color-border); }
        .btn-outline-dark:hover { border-color: var(--color-accent); color: var(--color-accent); }

        /* ── ENQUIRY BUTTON STATES ── */
        .btn-primary:disabled {
            opacity: 0.8;
            cursor: not-allowed;
            transform: scale(0.98) !important;
            filter: none !important;
        }
        .btn-primary.loading {
            background: #6c757d !important;
            color: white !important;
            box-shadow: none !important;
        }
        .btn-primary.success {
            background: var(--color-success) !important;
            color: white !important;
            box-shadow: 0 4px 15px rgba(16,185,129,0.3) !important;
        }
        .btn-primary.error {
            background: #dc3545 !important;
            color: white !important;
            box-shadow: 0 4px 15px rgba(220,53,69,0.3) !important;
        }
        .btn-primary:active:not(:disabled) {
            transform: scale(0.96);
        }

        .agent-block { padding-top: 1.25rem; border-top: 1px solid var(--color-border); display: flex; align-items: center; gap: 0.875rem; }
        .agent-avatar { width: 42px; height: 42px; border-radius: 50%; background: rgba(201,168,74,0.12); display: flex; align-items: center; justify-content: center; font-size: 1.1rem; color: var(--color-accent); flex-shrink: 0; }
        .agent-name { font-weight: 600; font-size: 0.9rem; color: var(--color-text-main); }
        .agent-label { font-size: 0.78rem; color: var(--color-text-muted); }

        /* Enquiry modal */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(8px); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 2rem; }
        .modal-overlay.active { display: flex; }
        .modal { background: var(--color-surface); border-radius: 20px; max-width: 480px; width: 100%; max-height: 90vh; overflow-y: auto; }
        .modal-header { padding: 1.5rem; border-bottom: 1px solid var(--color-border); display: flex; justify-content: space-between; align-items: center; }
        .modal-header h3 { font-size: 1.1rem; color: var(--color-text-main); }
        .modal-close { background: none; border: none; font-size: 1.5rem; color: var(--color-text-muted); cursor: pointer; }
        .modal-body { padding: 1.5rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 500; color: var(--color-text-main); margin-bottom: 0.4rem; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; background: var(--color-bg); border: 1px solid var(--color-border); border-radius: 10px; padding: 0.75rem 1rem; color: var(--color-text-main); font-size: 0.9rem; outline: none; font-family: inherit; }
        .form-group input:focus, .form-group textarea:focus { border-color: var(--color-accent); }
        .form-group textarea { min-height: 90px; resize: vertical; }
        .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--color-primary);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            z-index: 3000;
            opacity: 0;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .toast.success { border-left: 4px solid var(--color-success); }
        .toast.error { border-left: 4px solid #dc3545; }

        /* Loading / Error */
        .state-block { text-align: center; padding: 5rem 2rem; }
        .state-block i { font-size: 3rem; color: var(--color-text-muted); margin-bottom: 1rem; display: block; opacity: 0.4; }
        .state-block p { color: var(--color-text-muted); }

        @media (max-width: 900px) {
            .detail-grid { grid-template-columns: 1fr; }
            .sidebar-card { position: static; }
            .form-row-2 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-container">
        <a href="/" class="logo" aria-label="Ten&See home"><img src="/assets/logo.png" alt="Ten&See logo"><span class="logo-text">Ten<span>&</span>See</span></a>
        <div class="nav-actions">
            <a href="/listings.html" class="nav-back"><i class="fas fa-arrow-left"></i> Back to Listings</a>
            <button type="button" class="theme-toggle" data-theme-toggle aria-label="Switch to dark mode">
                <i class="fas fa-moon" aria-hidden="true"></i>
            </button>
        </div>
    </div>
</nav>

<div class="page-wrap" id="pageWrap">
    <div class="state-block"><i class="fas fa-spinner fa-spin"></i><p>Loading room details...</p></div>
</div>

<!-- Enquiry Modal -->
<div class="modal-overlay" id="enquiryModal">
    <div class="modal">
        <div class="modal-header">
            <h3><i class="fas fa-paper-plane" style="color:var(--color-accent);margin-right:0.5rem;"></i> Send Enquiry</h3>
            <button class="modal-close" onclick="closeModal()">&times;</button>
        </div>
        <div class="modal-body">
            <div class="form-row-2">
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" id="eqName" placeholder="Your name" required>
                </div>
                <div class="form-group">
                    <label>Phone</label>
                    <input type="tel" id="eqPhone" placeholder="+60...">
                </div>
            </div>
            <div class="form-group">
                <label>Email *</label>
                <input type="email" id="eqEmail" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
                <label>University</label>
                <input type="text" id="eqUni" placeholder="e.g. Taylor's University">
            </div>
            <div class="form-group">
                <label>Preferred Move-in Date</label>
                <input type="date" id="eqDate">
            </div>
            <div class="form-group">
                <label>Message</label>
                <textarea id="eqMsg" placeholder="Any questions or special requirements..."></textarea>
            </div>
            <button class="btn btn-primary" id="enquiryBtn" onclick="submitEnquiry()" style="margin-bottom:0;">
                <span id="btnText"><i class="fas fa-paper-plane"></i> Send Enquiry</span>
                <span id="btnSpinner" style="display:none;"><i class="fas fa-spinner fa-spin"></i> Sending...</span>
            </button>
        </div>
    </div>
</div>

<!-- Toast Notification -->
<div class="toast" id="toast"></div>

<script>
    let currentListing = null;

    async function init() {
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        if (!id) { showError('No listing ID provided.'); return; }

        try {
            const res = await fetch(`/api/listings/${id}`);
            const data = await res.json();
            if (!data.success || !data.data) { showError('Listing not found.'); return; }
            currentListing = data.data;
            document.title = `${currentListing.title} — Ten&See`;
            renderListing(currentListing);
            injectListingSchema(currentListing);
            initListingMap(currentListing);
        } catch (e) {
            showError('Could not load listing. Please try again.');
        }
    }

    function injectListingSchema(l) {
        const typeMap = { apartment: 'Apartment', room: 'Room', shared_room: 'Room', studio: 'Apartment', house: 'House', condo: 'Apartment' };
        const ptype = (l.propertyType || '').toLowerCase();
        const schemaType = typeMap[ptype] || 'Accommodation';

        const schema = {
            '@context': 'https://schema.org',
            '@type': ['Product', schemaType],
            name: l.title,
            url: window.location.href,
            numberOfBedrooms: l.bedrooms || undefined,
            numberOfBathroomsTotal: l.bathrooms || undefined,
            occupancy: l.maxOccupants ? { '@type': 'QuantitativeValue', maxValue: l.maxOccupants, unitText: 'person' } : undefined,
            address: {
                '@type': 'PostalAddress',
                streetAddress: l.location?.address || undefined,
                addressLocality: l.location?.area || l.location?.city || undefined,
                addressRegion: l.location?.city || undefined,
                addressCountry: 'MY'
            },
            offers: {
                '@type': 'Offer',
                price: l.price,
                priceCurrency: 'MYR',
                availability: 'https://schema.org/InStock',
                url: window.location.href,
                availabilityStarts: l.availableFrom || undefined,
                availabilityEnds: l.availableUntil || undefined,
                priceSpecification: {
                    '@type': 'UnitPriceSpecification',
                    price: l.price,
                    priceCurrency: 'MYR',
                    unitText: l.pricePeriod || 'month'
                }
            }
        };

        if (l.description) schema.description = l.description.replace(/\s+/g, ' ').trim().slice(0, 5000);
        if (l.images && l.images.length) schema.image = l.images;
        if (l.amenities && l.amenities.length) {
            schema.amenityFeature = l.amenities.map(a => ({ '@type': 'LocationFeatureSpecification', name: a, value: true }));
        }
        if (typeof l.location?.lat === 'number' && typeof l.location?.lng === 'number') {
            schema.geo = { '@type': 'GeoCoordinates', latitude: l.location.lat, longitude: l.location.lng };
        }

        const existing = document.getElementById('listing-jsonld');
        if (existing) existing.remove();
        const el = document.createElement('script');
        el.type = 'application/ld+json';
        el.id = 'listing-jsonld';
        el.textContent = JSON.stringify(schema);
        document.head.appendChild(el);
    }

    function renderListing(l) {
        const wrap = document.getElementById('pageWrap');

        const formatDate = (d) => d ? new Date(d).toLocaleDateString('en-MY', { day: 'numeric', month: 'long', year: 'numeric' }) : 'Flexible';
        const whatsappNum = l.whatsappNumber ? l.whatsappNumber.replace(/\D/g,'') : '';
        const whatsappMsg = encodeURIComponent(`Hi! I'm interested in "${l.title}" listed on Ten&See. Can you tell me more?`);
        const wechatId = l.wechatId || '';

        wrap.innerHTML = `
            <div class="breadcrumb">
                <a href="/">Home</a>
                <i class="fas fa-chevron-right" style="font-size:0.7rem;"></i>
                <a href="/listings.html">Listings</a>
                <i class="fas fa-chevron-right" style="font-size:0.7rem;"></i>
                <span>${l.title}</span>
            </div>

            <div class="detail-grid">
                <!-- LEFT COLUMN -->
                <div>
                    <!-- Gallery -->
                    <div class="gallery">
                        <div class="gallery-main">
                            ${l.images && l.images.length
                                ? `<img src="${l.images[0]}" alt="${l.title}" id="mainImg">`
                                : `<div class="gallery-placeholder"><i class="fas fa-building"></i></div>`
                            }
                        </div>
                    </div>

                    <!-- Title + Price -->
                    <div class="info-card">
                        <span class="listing-type-badge">${l.propertyType.replace(/_/g,' ')}</span>
                        <h1 class="listing-title">${l.title}</h1>
                        <div class="listing-location">
                            <i class="fas fa-map-marker-alt"></i>
                            ${l.location?.area || l.location?.city || 'Klang Valley'}
                            ${l.location?.university ? `<span style="margin-left:0.5rem;background:rgba(201,168,74,0.1);padding:0.2rem 0.6rem;border-radius:6px;font-size:0.8rem;color:var(--color-accent);">Near ${l.location.university}</span>` : ''}
                        </div>
                        ${l.location?.address ? `<div style="font-size:0.85rem;color:var(--color-text-muted);margin-bottom:1rem;margin-left:1.5rem;">${l.location.address}</div>` : ''}
                        <div class="price-block">
                            <span class="price-main">RM ${l.price.toLocaleString()}</span>
                            <span class="price-period">/ ${l.pricePeriod}</span>
                        </div>
                        <div class="stats-row">
                            ${l.bedrooms ? `<div class="stat-item"><i class="fas fa-bed"></i> <strong>${l.bedrooms}</strong> Bedroom${l.bedrooms > 1 ? 's' : ''}</div>` : ''}
                            ${l.bathrooms ? `<div class="stat-item"><i class="fas fa-bath"></i> <strong>${l.bathrooms}</strong> Bathroom${l.bathrooms > 1 ? 's' : ''}</div>` : ''}
                            <div class="stat-item"><i class="fas fa-user-friends"></i> Max <strong>${l.maxOccupants || 1}</strong> occupant${(l.maxOccupants||1) > 1 ? 's' : ''}</div>
                            <div class="stat-item"><i class="fas fa-eye"></i> <strong>${l.views || 0}</strong> views</div>
                        </div>
                        <div class="description-block">
                            <h3>About this room</h3>
                            <p>${l.description}</p>
                        </div>
                    </div>

                    <!-- Amenities -->
                    ${l.amenities && l.amenities.length ? `
                    <div class="info-card">
                        <h3 style="font-size:1rem;font-weight:600;color:var(--color-text-main);margin-bottom:0.5rem;">Amenities</h3>
                        <div class="amenities-grid">
                            ${l.amenities.map(a => `<span class="amenity"><i class="fas fa-check"></i> ${a}</span>`).join('')}
                        </div>
                    </div>
                    ` : ''}

                    <!-- Availability -->
                    <div class="info-card">
                        <h3 style="font-size:1rem;font-weight:600;color:var(--color-text-main);margin-bottom:0.75rem;">Availability</h3>
                        <div class="avail-row"><span class="avail-label">Available From</span><span class="avail-value">${formatDate(l.availableFrom)}</span></div>
                        ${l.availableUntil ? `<div class="avail-row"><span class="avail-label">Available Until</span><span class="avail-value">${formatDate(l.availableUntil)}</span></div>` : ''}
                        <div class="avail-row"><span class="avail-label">Status</span><span class="avail-value" style="color:var(--color-success);"><i class="fas fa-circle" style="font-size:0.6rem;margin-right:0.35rem;"></i>Available</span></div>
                    </div>

                    <!-- Map -->
                    ${(l.linkedUniversities && l.linkedUniversities.length && typeof l.location?.lat === 'number') ? `
                    <div class="info-card" style="padding:0;overflow:hidden;">
                        <div style="padding:1.25rem 1.5rem 0.75rem;">
                            <h3 class="map-section-title"><i class="fas fa-map-marked-alt"></i> Getting Here</h3>
                        </div>
                        <div id="map-container" style="border-radius:0 0 20px 20px;height:420px;"></div>
                    </div>` : ''}
                </div>

                <!-- RIGHT COLUMN (Sidebar) -->
                <div>
                    <div class="sidebar-card">
                        <div class="sidebar-price">RM ${l.price.toLocaleString()}</div>
                        <div class="sidebar-period">per ${l.pricePeriod}</div>

                        <button class="btn btn-primary" onclick="openModal()">
                            <i class="fas fa-paper-plane"></i> Send Enquiry
                        </button>
                        ${whatsappNum ? `
                        <a href="https://wa.me/${whatsappNum}?text=${whatsappMsg}" class="btn btn-whatsapp">
                            <i class="fab fa-whatsapp"></i> WhatsApp Agent
                        </a>
                        ` : ''}
                        ${wechatId ? `
                        <button class="btn btn-sm" style="background:#07c160;color:white;padding:0.65rem 1.2rem;" onclick="openWechat('${wechatId}')" title="WeChat ID: ${wechatId}">
                            <i class="fab fa-weixin"></i> WeChat
                        </button>
                        ` : ''}
                        <a href="/listings.html" class="btn btn-outline-dark">
                            <i class="fas fa-arrow-left"></i> Back to Listings
                        </a>

                        ${l.agentName ? `
                        <div class="agent-block">
                            <div class="agent-avatar"><i class="fas fa-user"></i></div>
                            <div>
                                <div class="agent-name">${l.agentName}</div>
                                <div class="agent-label">Ten&See Agent</div>
                            </div>
                        </div>
                        ` : ''}
                    </div>
                </div>
            </div>
        `;
    }

    function openWechat(id) {
        const btn = event.currentTarget;
        const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
        if (isMobile) {
            const appUrl = `weixin://dl/chat?username=${encodeURIComponent(id)}`;
            const start = Date.now();
            window.location = appUrl;
            setTimeout(() => {
                if (Date.now() - start < 2000) {
                    navigator.clipboard.writeText(id).catch(() => {});
                    const orig = btn.innerHTML;
                    btn.innerHTML = '<i class="fas fa-check"></i> ID Copied!';
                    setTimeout(() => { btn.innerHTML = orig; }, 2500);
                    alert(`WeChat app not detected.\n\nWeChat ID copied to clipboard:\n${id}\n\nOpen WeChat and search for this ID.`);
                }
            }, 1500);
        } else {
            navigator.clipboard.writeText(id).catch(() => {});
            const orig = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-check"></i> ID Copied!';
            setTimeout(() => { btn.innerHTML = orig; }, 2500);
            window.open('https://web.wechat.com', '_blank');
        }
    }

    function openModal() {
        document.getElementById('enquiryModal').classList.add('active');
    }
    function closeModal() {
        document.getElementById('enquiryModal').classList.remove('active');
        resetBtn();
    }
    document.getElementById('enquiryModal').addEventListener('click', e => {
        if (e.target === document.getElementById('enquiryModal')) closeModal();
    });

    // ── BUTTON STATE MANAGEMENT ──
    function setBtnState(state) {
        const btn = document.getElementById('enquiryBtn');
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');

        btn.classList.remove('loading', 'success', 'error');
        btn.disabled = false;

        switch(state) {
            case 'loading':
                btn.classList.add('loading');
                btn.disabled = true;
                btnText.style.display = 'none';
                btnSpinner.style.display = 'inline';
                break;
            case 'success':
                btn.classList.add('success');
                btnText.innerHTML = '<i class="fas fa-check"></i> Sent!';
                btnText.style.display = 'inline';
                btnSpinner.style.display = 'none';
                break;
            case 'error':
                btn.classList.add('error');
                btnText.innerHTML = '<i class="fas fa-times"></i> Failed';
                btnText.style.display = 'inline';
                btnSpinner.style.display = 'none';
                break;
            default: // idle
                btnText.innerHTML = '<i class="fas fa-paper-plane"></i> Send Enquiry';
                btnText.style.display = 'inline';
                btnSpinner.style.display = 'none';
        }
    }

    function resetBtn() {
        setTimeout(() => setBtnState('idle'), 3000);
    }

    function showToast(message, type = 'success') {
        const toast = document.getElementById('toast');
        toast.className = `toast ${type}`;
        toast.innerHTML = type === 'success' 
            ? `<i class="fas fa-check-circle" style="color:var(--color-success)"></i> ${message}`
            : `<i class="fas fa-exclamation-circle" style="color:#dc3545"></i> ${message}`;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // ── FIXED SUBMIT FUNCTION ──
   async function submitEnquiry() {
    const name = document.getElementById('eqName').value.trim();
    const email = document.getElementById('eqEmail').value.trim();
    
    if (!name || !email) { 
        showToast('Please enter your name and email.', 'error');
        return; 
    }

    setBtnState('loading');

    const body = {
        name,
        email,
        phone: document.getElementById('eqPhone').value,
        university: document.getElementById('eqUni').value,
        message: `Enquiry for "${currentListing?.title}". Move-in: ${document.getElementById('eqDate').value || 'Flexible'}. ${document.getElementById('eqMsg').value}`,
        source: 'booking_form',
        listingId: currentListing?._id,
        listingTitle: currentListing?.title
    };

    fetch('/api/leads', { 
        method: 'POST', 
        headers: { 'Content-Type': 'application/json' }, 
        body: JSON.stringify(body)
    })
    .then(async (res) => {
        // Read response as text first (never crashes)
        const responseText = await res.text();
        console.log('=== ENQUIRY RESPONSE ===');
        console.log('Status:', res.status);
        console.log('Status Text:', res.statusText);
        console.log('Response body:', responseText);

        // Check if HTTP status is 200-299 (success range)
        // Your backend returns 201 for created leads
        if (res.ok) {
            console.log('✅ Request succeeded!');
            setBtnState('success');
            showToast('Enquiry sent! We\'ll get back to you within 24 hours.');
            
            setTimeout(() => {
                closeModal();
                document.getElementById('eqName').value = '';
                document.getElementById('eqEmail').value = '';
                document.getElementById('eqPhone').value = '';
                document.getElementById('eqUni').value = '';
                document.getElementById('eqDate').value = '';
                document.getElementById('eqMsg').value = '';
            }, 1500);
        } else {
            // Server returned error status (400, 500, etc.)
            console.error('❌ Server returned error status:', res.status);
            throw new Error(`Server error: ${res.status}`);
        }
    })
    .catch((err) => {
        console.error('❌ Fetch error:', err);
        setBtnState('error');
        showToast('Something went wrong. Please try WhatsApp.', 'error');
        resetBtn();
    });
}
    // Emergency reset — prevents infinite loading if something goes wrong
    setInterval(() => {
        const btn = document.getElementById('enquiryBtn');
        if (btn && btn.disabled && btn.classList.contains('loading')) {
            console.log('Force resetting stuck button');
            setBtnState('idle');
        }
    }, 15000);

    function showError(msg) {
        document.getElementById('pageWrap').innerHTML = `
            <div class="state-block">
                <i class="fas fa-exclamation-circle"></i>
                <p>${msg}</p>
                <a href="/listings.html" style="color:var(--color-accent);text-decoration:none;margin-top:1rem;display:inline-block;">← Back to Listings</a>
            </div>
        `;
    }

    function initListingMap(l) {
        if (!l.linkedUniversities || !l.linkedUniversities.length) return;
        if (typeof l.location?.lat !== 'number') return;
        const payload = {
            lat: l.location.lat,
            lng: l.location.lng,
            name: l.title,
            linkedUniversities: l.linkedUniversities
        };
        // Wait for initMap to be available (map-feature.js may still be parsing)
        function tryInit(attempts) {
            if (typeof initMap === 'function') { initMap(payload); return; }
            if (attempts > 0) setTimeout(() => tryInit(attempts - 1), 100);
        }
        tryInit(20);
    }

    init();
</script>
<script src="/cookie-consent.js"></script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Something Big is Coming | Ten & See</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050b0a; /* Ultra-deep, premium dark forest foundation */
            --accent-gradient: linear-gradient(135deg, #10b981 0%, #34d399 50%, #ffffff 100%); /* Vibrant Emerald to Clean White */
            --text-main: #ffffff;
            --text-muted: #a7f3d0; /* Soft green-tinted muted text */
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(16, 185, 129, 0.2); /* Subtle emerald aura */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 2rem;
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient background glow effect (Green aurora) */
        body::before {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: var(--accent-gradient);
            filter: blur(150px);
            opacity: 0.12;
            top: -10%;
            left: -10%;
            z-index: 0;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: var(--accent-gradient);
            filter: blur(130px);
            opacity: 0.08;
            bottom: 5%;
            right: -5%;
            z-index: 0;
            pointer-events: none;
        }

        header, main, footer {
            width: 100%;
            max-width: 1200px;
            z-index: 1;
        }

        /* Header / Logo */
        header {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem 0;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Main Content */
        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin: 4rem 0;
        }

        .badge {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.25);
            color: #34d399;
            padding: 0.5rem 1rem;
            border-radius: 99px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 2rem;
            display: inline-block;
        }

        h1 {
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -0.03em;
            margin-bottom: 1.5rem;
        }

        h1 span {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            font-size: clamp(1.1rem, 2vw, 1.3rem);
            color: #94a3b8;
            max-width: 600px;
            line-height: 1.6;
            margin-bottom: 3rem;
        }

        /* Countdown Timer */
        .countdown {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 3.5rem;
        }

        .countdown-item {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(10px);
            padding: 1.5rem;
            border-radius: 16px;
            min-width: 90px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
        }

        .countdown-number {
            font-size: 2.5rem;
            font-weight: 800;
            display: block;
            background: linear-gradient(to bottom, #ffffff, #e2e8f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .countdown-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.1em;
            font-weight: 600;
            margin-top: 0.25rem;
            display: block;
        }

        /* Subscription Form */
        .form-container {
            width: 100%;
            max-width: 480px;
        }

        .signup-form {
            display: flex;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 0.5rem;
            border-radius: 99px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .signup-form:focus-within {
            border-color: #10b981;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.15);
        }

        .signup-form input[type="email"] {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            padding: 0 1.5rem;
            color: var(--text-main);
            font-family: inherit;
            font-size: 1rem;
        }

        .signup-form input[type="email"]::placeholder {
            color: #475569;
        }

        .signup-form button {
            background: #ffffff;
            color: #050b0a;
            border: none;
            padding: 0.85rem 1.75rem;
            border-radius: 99px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: transform 0.2s ease, background-color 0.2s ease;
        }

        .signup-form button:hover {
            transform: scale(1.02);
            background: #e2e8f0;
        }

        /* Footer */
        footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 0;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.9rem;
            color: #64748b;
        }

        .beta-link {
            color: #10b981;
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: color 0.2s ease;
        }

        .beta-link:hover {
            color: #34d399;
        }

        .beta-link::after {
            content: '→';
        }

        /* Responsive Tweaks */
        @media (max-width: 600px) {
            body { padding: 1.5rem; }
            .countdown { gap: 0.75rem; }
            .countdown-item { padding: 1rem; min-width: 70px; }
            .countdown-number { font-size: 1.75rem; }
            .signup-form { border-radius: 16px; flex-direction: column; gap: 0.5rem; padding: 0.5rem; background: transparent; border: none;}
            .signup-form input[type="email"] { background: var(--card-bg); border: 1px solid var(--card-border); padding: 1rem; border-radius: 12px; margin-bottom: 0.5rem;}
            .signup-form button { border-radius: 12px; padding: 1rem; }
            footer { flex-direction: column; gap: 1rem; text-align: center; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">TEN & SEE</div>
    </header>

    <main>
        <div class="badge">Development in Progress</div>
        <h1>Something <span>Extraordinary</span><br>is on the Horizon.</h1>
        <p class="tagline">We're crafting a premier digital experience. Sign up to get early access when we deploy the final build.</p>

        <!-- Countdown Timer -->
        <div class="countdown">
            <div class="countdown-item">
                <span class="countdown-number" id="days">30</span>
                <span class="countdown-label">Days</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-number" id="hours">00</span>
                <span class="countdown-label">Hours</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-number" id="minutes">00</span>
                <span class="countdown-label">Mins</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-number" id="seconds">00</span>
                <span class="countdown-label">Secs</span>
            </div>
        </div>

        <!-- Call to Action Form -->
        <div class="form-container">
            <form class="signup-form" action="#" method="POST" onsubmit="alert('Thank you! We will keep you updated.'); return false;">
                <input type="email" placeholder="Enter your email address" required aria-label="Email address">
                <button type="submit">Notify Me</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Ten & See. All rights reserved.</p>
        <!-- Sneak peek redirect to your beta subdomain -->
        <a href="https://beta.tenandsee.homes" class="beta-link" target="_blank">Explore our Beta build</a>
    </footer>

    <script>
        // Simple Dynamic Countdown Script
        // Set your target launch date here (e.g., 30 days from now)
        const targetDate = new Date();
        targetDate.setDate(targetDate.getDate() + 30); 

        function updateCountdown() {
            const now = new Date().getTime();
            const difference = targetDate - now;

            const d = Math.floor(difference / (1000 * 60 * 60 * 24));
            const h = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((difference % (1000 * 60)) / 1000);

            document.getElementById('days').innerText = d < 10 ? '0' + d : d;
            document.getElementById('hours').innerText = h < 10 ? '0' + h : h;
            document.getElementById('minutes').innerText = m < 10 ? '0' + m : m;
            document.getElementById('seconds').innerText = s < 10 ? '0' + s : s;

            if (difference < 0) {
                clearInterval(interval);
                document.querySelector('.countdown').innerHTML = "<h3>We are officially live!</h3>";
            }
        }

        const interval = setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property — Ten&See</title>
    <link rel="icon" type="image/png" href="/assets/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
    <script src="/theme.js"></script>
    <link rel="stylesheet" href="/theme.css?v=2">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* Global smooth transitions for theme changes - match homepage */
        body, div, span, p, h1, h2, h3, h4, h5, h6, a, button, section, article, aside, header, footer, nav, main {
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }
        
        body { font-family: 'DM Sans', sans-serif; background: var(--color-bg); color: var(--color-text-main); min-height: 100vh; }

        /* NAV - Fixed dark like homepage */
        .nav { position: sticky; top: 0; z-index: 100; background: #2C3830; backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.1); padding: 0 2rem; height: 64px; display: flex; align-items: center; justify-content: space-between; }
        .nav-logo { font-family: 'Space Grotesk', sans-serif; font-size: 1.35rem; font-weight: 700; color: #c9a84c; text-decoration: none; }
        .nav-back { display: flex; align-items: center; gap: 0.5rem; color: rgba(255,255,255,0.7); font-size: 0.9rem; font-weight: 500; text-decoration: none; transition: color 0.2s; }
        .nav-back:hover { color: #c9a84c; }
        .logo { font-family: 'Space Grotesk', sans-serif; font-size: 1.75rem; font-weight: 700; color: #c9a84c; text-decoration: none; display: inline-flex; align-items: center; }
        .logo img { width: 64px; height: 64px; object-fit: contain; display: block; border-radius: 0; background: transparent; }
        .logo-text { font-family: 'Space Grotesk', sans-serif; font-size: 1.75rem; font-weight: 600; color: white; margin-left: 0.75rem; letter-spacing: -0.02em; display: flex; align-items: center; }
        .logo-text span { color: #c9a84c; font-weight: 700; }
        /* Theme toggle - use theme.css styles, just override for dark nav */
        .nav .theme-toggle { border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: white; }
        .nav .theme-toggle:hover { border-color: #c9a84c; color: #c9a84c; }
        /* Moon icon only - white on dark nav, dark on light mode pages */
        [data-theme="light"] .nav .theme-toggle { color: rgba(255,255,255,0.8); }
        [data-theme="light"] .nav .theme-toggle:hover { color: #c9a84c; }

        /* HERO */
        .property-hero { position: relative; height: 420px; overflow: hidden; background: var(--color-primary); }
        .property-hero img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }
        .property-hero-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(26,33,24,0.95) 0%, rgba(26,33,24,0.2) 60%); }
        .property-hero-content { position: absolute; bottom: 0; left: 0; right: 0; padding: 2.5rem 3rem; }
        .property-hero-badge { display: inline-flex; align-items: center; gap: 0.4rem; background: rgba(201,168,76,0.2); border: 1px solid rgba(201,168,76,0.4); color: var(--color-accent); padding: 0.35rem 0.875rem; border-radius: 20px; font-size: 0.8rem; font-weight: 600; margin-bottom: 0.75rem; }
        .property-hero-name { font-family: 'Space Grotesk', sans-serif; font-size: 2.5rem; font-weight: 700; color: white; line-height: 1.1; margin-bottom: 0.5rem; }
        .property-hero-location { display: flex; align-items: center; gap: 0.5rem; color: rgba(255,255,255,0.75); font-size: 0.95rem; }

        /* MAIN LAYOUT */
        .property-container { max-width: 1280px; margin: 0 auto; padding: 3rem 2rem; }

        /* INFO STRIP */
        .property-info-strip { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; margin-bottom: 3rem; }
        .info-strip-card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: 16px; padding: 1.5rem; text-align: center; box-shadow: var(--shadow-sm); transition: background 0.3s ease, border-color 0.3s ease; }
        .info-strip-icon { font-size: 1.5rem; color: var(--color-accent); margin-bottom: 0.5rem; }
        .info-strip-value { font-size: 1.4rem; font-weight: 700; color: var(--color-text-main); transition: color 0.3s ease; }
        .info-strip-label { font-size: 0.8rem; color: var(--color-text-muted); margin-top: 0.2rem; transition: color 0.3s ease; }

        /* AMENITIES */
        .section-title { font-family: 'Space Grotesk', sans-serif; font-size: 1.25rem; font-weight: 700; color: var(--color-text-main); margin-bottom: 1.25rem; transition: color 0.3s ease; }
        .amenities-grid { display: flex; flex-wrap: wrap; gap: 0.75rem; margin-bottom: 3rem; }
        .amenity-pill { display: flex; align-items: center; gap: 0.5rem; padding: 0.6rem 1rem; background: var(--color-surface); border: 1px solid var(--color-border); border-radius: 20px; font-size: 0.875rem; font-weight: 500; color: var(--color-text-main); transition: background 0.3s ease, border-color 0.3s ease, color 0.3s ease; }
        .amenity-pill i { color: var(--color-accent); font-size: 0.8rem; }

        /* ROOM TYPES BAR - simple display without buttons */
        .room-types-bar { display: flex; flex-wrap: wrap; gap: 0.75rem; margin-bottom: 1.5rem; padding: 0.75rem 0; }
        .room-type-tag { padding: 0.4rem 1rem; background: var(--color-surface); border: 1px solid var(--color-border); border-radius: 20px; color: var(--color-text-main); font-size: 0.85rem; font-weight: 500; text-transform: capitalize; }

        /* LISTINGS GRID */
        .room-listings-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; }
        @media (max-width: 768px) { .room-listings-grid { grid-template-columns: 1fr; } }

        /* LISTING CARD */
        .listing-card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: 20px; overflow: hidden; transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease, background 0.3s ease; text-decoration: none; display: block; }
        .listing-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); border-color: var(--color-accent); }
        .listing-image { position: relative; height: 220px; overflow: hidden; }
        .listing-image img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .listing-card:hover .listing-image img { transform: scale(1.05); }
        .listing-type-badge { position: absolute; top: 1rem; left: 1rem; background: var(--color-primary); color: white; padding: 0.5rem 1rem; border-radius: 20px; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
        .listing-price-tag { position: absolute; bottom: 1rem; left: 1rem; background: linear-gradient(135deg, var(--color-accent), #b8941f); color: var(--color-primary); padding: 0.5rem 1rem; border-radius: 10px; font-size: 1rem; font-weight: 700; }
        .listing-content { padding: 1.5rem; }
        .listing-title { font-family: 'Space Grotesk', sans-serif; font-size: 1.1rem; font-weight: 700; color: var(--color-text-main); margin-bottom: 0.5rem; transition: color 0.3s ease; }
        .listing-meta { display: flex; gap: 1rem; margin-bottom: 0.75rem; }
        .listing-meta-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.82rem; color: var(--color-text-muted); transition: color 0.3s ease; }
        .listing-meta-item i { color: var(--color-accent); }
        .listing-amenities { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1rem; }
        .amenity-tag { padding: 0.25rem 0.6rem; background: rgba(44,56,48,0.05); border: 1px solid var(--color-border); border-radius: 6px; font-size: 0.72rem; color: var(--color-text-muted); transition: background 0.3s ease, border-color 0.3s ease, color 0.3s ease; }
        .btn-enquire { display: flex; align-items: center; justify-content: center; gap: 0.5rem; width: 100%; padding: 0.75rem; background: var(--color-primary); color: white; border: none; border-radius: 12px; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.2s; text-decoration: none; }
        .btn-enquire:hover { background: var(--color-accent); color: var(--color-primary); }

        /* EMPTY */
        .empty-state { text-align: center; padding: 4rem 2rem; color: var(--color-text-muted); }
        .empty-state i { font-size: 3rem; margin-bottom: 1rem; color: var(--color-border); display: block; }

        /* LOADING */
        .loading-spinner { display: flex; justify-content: center; padding: 4rem; }
        .spinner { width: 40px; height: 40px; border: 3px solid var(--color-border); border-top-color: var(--color-accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 900px) {
            .property-info-strip { grid-template-columns: repeat(2, 1fr); }
            .property-hero-name { font-size: 1.8rem; }
            .property-hero-content { padding: 2rem 1.5rem; }
            .property-container { padding: 2rem 1.25rem; }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <a href="/" class="logo" aria-label="Ten&See home"><img src="/assets/logo.png" alt="Ten&See logo"><span class="logo-text">Ten<span>&</span>See</span></a>
        <div style="display: flex; align-items: center; gap: 1rem;">
            <button type="button" class="theme-toggle" data-theme-toggle aria-label="Switch to dark mode">
                <i class="fas fa-moon" aria-hidden="true"></i>
            </button>
            <a class="nav-back" href="/listings.html"><i class="fas fa-arrow-left"></i> All Properties</a>
        </div>
    </nav>

    <div class="property-hero" id="propertyHero">
        <img id="heroImg" src="https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?w=1400" alt="Property">
        <div class="property-hero-overlay"></div>
        <div class="property-hero-content">
            <div class="property-hero-badge"><i class="fas fa-check-circle"></i> Verified Property</div>
            <h1 class="property-hero-name" id="propertyName">Loading…</h1>
            <div class="property-hero-location"><i class="fas fa-map-marker-alt"></i> <span id="propertyLocation">—</span></div>
        </div>
    </div>

    <div class="property-container">
        <div class="property-info-strip" id="infoStrip">
            <div class="loading-spinner"><div class="spinner"></div></div>
        </div>

        <div id="amenitiesSection" style="display:none;">
            <h2 class="section-title">Amenities</h2>
            <div class="amenities-grid" id="amenitiesGrid"></div>
        </div>

        <h2 class="section-title">Available Rooms</h2>
        <div class="room-types-bar" id="roomTypesBar"></div>
        <div class="room-listings-grid" id="roomListingsGrid">
            <div class="loading-spinner"><div class="spinner"></div></div>
        </div>
    </div>

    <!-- Booking Modal -->
    <div id="bookingModal" style="position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:9999;padding:1rem;">
        <div style="background:var(--color-surface);border-radius:20px;width:100%;max-width:480px;overflow:hidden;box-shadow:var(--shadow-lg);">
            <div style="padding:1.5rem 2rem;border-bottom:1px solid var(--color-border);display:flex;justify-content:space-between;align-items:center;">
                <h3 style="font-family:'Space Grotesk',sans-serif;font-size:1.2rem;"><i class="fas fa-calendar-check" style="color:var(--color-accent);margin-right:0.5rem;"></i>Book a Viewing</h3>
                <button onclick="closeBooking()" style="background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--color-text-muted);">&times;</button>
            </div>
            <div style="padding:1.5rem 2rem;">
                <form id="bookingForm" onsubmit="submitBooking(event)">
                    <input type="hidden" id="bookingListingId">
                    <div style="margin-bottom:1rem;"><input class="form-input" type="text" id="bookingName" placeholder="Your Name" required style="width:100%;padding:0.75rem 1rem;border:1px solid var(--color-border);border-radius:10px;font-size:0.9rem;background:var(--color-bg);"></div>
                    <div style="margin-bottom:1rem;"><input class="form-input" type="email" id="bookingEmail" placeholder="Email Address" required style="width:100%;padding:0.75rem 1rem;border:1px solid var(--color-border);border-radius:10px;font-size:0.9rem;background:var(--color-bg);"></div>
                    <div style="margin-bottom:1rem;"><input class="form-input" type="tel" id="bookingPhone" placeholder="Phone / WhatsApp" style="width:100%;padding:0.75rem 1rem;border:1px solid var(--color-border);border-radius:10px;font-size:0.9rem;background:var(--color-bg);"></div>
                    <div style="margin-bottom:1.5rem;"><textarea id="bookingMessage" placeholder="Any questions?" rows="3" style="width:100%;padding:0.75rem 1rem;border:1px solid var(--color-border);border-radius:10px;font-size:0.9rem;background:var(--color-bg);resize:none;"></textarea></div>
                    <button type="submit" style="width:100%;padding:0.9rem;background:var(--color-primary);color:white;border:none;border-radius:12px;font-size:0.95rem;font-weight:600;cursor:pointer;">Send Enquiry</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 600, once: true, offset: 60 });

        const params = new URLSearchParams(window.location.search);
        const propertyId = params.get('id');
        let allRoomListings = [];

        const AMENITY_ICONS = {
            'WiFi': 'fa-wifi', 'Air Conditioning': 'fa-snowflake', 'Parking': 'fa-car',
            'Gym': 'fa-dumbbell', 'Swimming Pool': 'fa-swimming-pool', 'Kitchen': 'fa-utensils',
            'Laundry': 'fa-tshirt', 'CCTV': 'fa-camera', 'Security': 'fa-shield-alt',
            'Balcony': 'fa-archway', 'Water Heater': 'fa-fire', 'Furniture': 'fa-couch',
        };

        if (!propertyId) {
            window.location = '/listings.html';
        } else {
            loadPropertyPage();
        }

        async function loadPropertyPage() {
            try {
                const [propRes, listRes] = await Promise.all([
                    fetch(`/api/properties/${propertyId}`),
                    fetch(`/api/properties/${propertyId}/listings`)
                ]);
                const propData = await propRes.json();
                const listData = await listRes.json();

                if (!propData.success) { window.location = '/listings.html'; return; }

                const p = propData.data;
                allRoomListings = listData.data || [];

                // Hero
                document.title = `${p.name} — Ten&See`;
                document.getElementById('propertyName').textContent = p.name;
                document.getElementById('propertyLocation').textContent =
                    [p.location?.area, p.location?.university].filter(Boolean).join(' · ') || 'Klang Valley';
                if (p.images?.[0]) document.getElementById('heroImg').src = p.images[0];

                // Info strip
                const prices = allRoomListings.map(l => l.price);
                const minP = prices.length ? Math.min(...prices) : 0;
                const maxP = prices.length ? Math.max(...prices) : 0;
                const priceStr = prices.length === 0 ? 'N/A' : minP === maxP ? `RM ${minP}` : `RM ${minP}–${maxP}`;
                const types = [...new Set(allRoomListings.map(l => l.propertyType))];

                document.getElementById('infoStrip').innerHTML = `
                    <div class="info-strip-card" data-aos="fade-up" data-aos-delay="0">
                        <div class="info-strip-icon"><i class="fas fa-door-open"></i></div>
                        <div class="info-strip-value">${allRoomListings.length}</div>
                        <div class="info-strip-label">Total Rooms Listed</div>
                    </div>
                    <div class="info-strip-card" data-aos="fade-up" data-aos-delay="80">
                        <div class="info-strip-icon"><i class="fas fa-home"></i></div>
                        <div class="info-strip-value">${types.length}</div>
                        <div class="info-strip-label">Room Types</div>
                    </div>
                    <div class="info-strip-card" data-aos="fade-up" data-aos-delay="160">
                        <div class="info-strip-icon"><i class="fas fa-tag"></i></div>
                        <div class="info-strip-value" style="font-size:1.1rem;">${priceStr}</div>
                        <div class="info-strip-label">Price Range / month</div>
                    </div>
                    <div class="info-strip-card" data-aos="fade-up" data-aos-delay="240">
                        <div class="info-strip-icon"><i class="fas fa-university"></i></div>
                        <div class="info-strip-value" style="font-size:0.9rem;line-height:1.3;">${p.location?.university || 'Klang Valley'}</div>
                        <div class="info-strip-label">Near University</div>
                    </div>
                `;

                // Amenities
                if (p.amenities?.length) {
                    document.getElementById('amenitiesSection').style.display = 'block';
                    document.getElementById('amenitiesGrid').innerHTML = p.amenities.map(a =>
                        `<div class="amenity-pill"><i class="fas ${AMENITY_ICONS[a] || 'fa-check'}"></i>${a}</div>`
                    ).join('');
                }

                // Room types display
                buildRoomTypesBar(types);

                // Render all listings
                renderRoomListings(allRoomListings);

            } catch (e) {
                console.error(e);
                document.getElementById('roomListingsGrid').innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-circle"></i><p>Failed to load property.</p></div>`;
            }
        }

        function buildRoomTypesBar(types) {
            const el = document.getElementById('roomTypesBar');
            if (!types.length) { el.style.display = 'none'; return; }
            el.innerHTML = types.map(t => `<span class="room-type-tag">${t.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase())}</span>`).join('');
        }

        function renderRoomListings(listings) {
            const grid = document.getElementById('roomListingsGrid');
            if (!listings.length) {
                grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><i class="fas fa-search"></i><p>No rooms available for this type.</p></div>`;
                return;
            }

            const TYPE_ORDER = { studio: 0, private_room: 1, shared_room: 2, apartment: 3, house: 4 };
            const sorted = [...listings].sort((a, b) => (TYPE_ORDER[a.propertyType] ?? 9) - (TYPE_ORDER[b.propertyType] ?? 9));

            grid.innerHTML = sorted.map((l, i) => `
                <a href="/listing.html?id=${l._id}" class="listing-card" data-aos="fade-up" data-aos-delay="${(i % 2) * 80}">
                    <div class="listing-image">
                        <img src="${l.images?.[0] || 'https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?w=800'}" alt="${l.title}">
                        <span class="listing-type-badge">${l.propertyType.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase())}</span>
                        <div class="listing-price-tag">RM ${l.price}<span style="font-size:0.75rem;font-weight:500;">/${l.pricePeriod}</span></div>
                    </div>
                    <div class="listing-content">
                        <h3 class="listing-title">${l.title}</h3>
                        <div class="listing-meta">
                            ${l.bedrooms ? `<span class="listing-meta-item"><i class="fas fa-bed"></i> ${l.bedrooms} BR</span>` : ''}
                            ${l.bathrooms ? `<span class="listing-meta-item"><i class="fas fa-bath"></i> ${l.bathrooms} BA</span>` : ''}
                            <span class="listing-meta-item"><i class="fas fa-user-friends"></i> Max ${l.maxOccupants || 1}</span>
                        </div>
                        <div class="listing-amenities">
                            ${(l.amenities || []).slice(0, 4).map(a => `<span class="amenity-tag">${a}</span>`).join('')}
                            ${l.amenities?.length > 4 ? `<span class="amenity-tag">+${l.amenities.length - 4}</span>` : ''}
                        </div>
                        <div class="btn-enquire" onclick="event.preventDefault(); openBooking('${l._id}')">
                            <i class="fas fa-calendar"></i> Enquire
                        </div>
                    </div>
                </a>
            `).join('');
            if (window.AOS) AOS.refresh();
        }

        function openBooking(id) {
            document.getElementById('bookingListingId').value = id;
            document.getElementById('bookingModal').style.display = 'flex';
        }
        function closeBooking() {
            document.getElementById('bookingModal').style.display = 'none';
            document.getElementById('bookingForm').reset();
        }
        document.getElementById('bookingModal').addEventListener('click', e => { if (e.target === document.getElementById('bookingModal')) closeBooking(); });

        // Theme toggle functionality - match homepage implementation
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            document.documentElement.setAttribute('data-theme', savedTheme);
        } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
        
        document.querySelectorAll('[data-theme-toggle]').forEach(btn => {
            const updateAria = () => {
                const current = document.documentElement.getAttribute('data-theme');
                btn.setAttribute('aria-label', current === 'dark' ? 'Switch to light mode' : 'Switch to dark mode');
            };
            updateAria();
            btn.addEventListener('click', () => {
                const currentTheme = document.documentElement.getAttribute('data-theme');
                const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', newTheme);
                localStorage.setItem('theme', newTheme);
                updateAria();
            });
        });

        async function submitBooking(e) {
            e.preventDefault();
            const data = {
                name: document.getElementById('bookingName').value,
                email: document.getElementById('bookingEmail').value,
                phone: document.getElementById('bookingPhone').value,
                message: document.getElementById('bookingMessage').value,
                source: 'booking_form',
                listingId: document.getElementById('bookingListingId').value
            };
            try {
                const r = await fetch('/api/bookings', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
                if (r.ok) { alert('Enquiry sent! We will contact you soon.'); closeBooking(); }
                else alert('Error sending enquiry. Please try again.');
            } catch { alert('Error sending enquiry. Please try again.'); }
        }
    </script>
    <script src="/cookie-consent.js"></script>
</body>
</html>

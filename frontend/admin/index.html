<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ten&See — Admin</title>
  <link rel="icon" type="image/png" href="/assets/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="/theme.js"></script>
  <link rel="stylesheet" href="/theme.css">
  <script src="/socket.io/socket.io.js"></script>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── LAYOUT ── */
    .layout { display: flex; min-height: 100vh; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 240px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      height: 100vh;
      z-index: 200;
      transition: transform var(--transition);
    }

    .sidebar-logo {
      padding: 1.5rem 1.25rem 1rem;
      border-bottom: 1px solid var(--border);
    }
    .logo-text {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      color: var(--gold);
      letter-spacing: -0.5px;
      display: inline-flex;
      align-items: center;
      gap: 0.65rem;
    }
    .logo-text img { width: 44px; height: 44px; object-fit: contain; border-radius: 10px; display: block; }
    .logo-sub { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; margin-top: 2px; }

    .sidebar-nav { flex: 1; padding: 0.75rem 0; overflow-y: auto; }

    .nav-section-label {
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      padding: 0.75rem 1.25rem 0.25rem;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.65rem 1.25rem;
      color: var(--text-muted);
      cursor: pointer;
      transition: all var(--transition);
      border-left: 3px solid transparent;
      font-size: 0.875rem;
      font-weight: 500;
      user-select: none;
      position: relative;
    }
    .nav-item:hover { color: var(--text); background: rgba(255,255,255,0.03); }
    .nav-item.active { color: var(--gold); background: var(--gold-dim); border-left-color: var(--gold); }
    .nav-item i { width: 18px; text-align: center; font-size: 0.85rem; }
    .nav-badge {
      margin-left: auto;
      background: var(--danger);
      color: white;
      font-size: 0.65rem;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 100px;
      min-width: 18px;
      text-align: center;
    }

    .sidebar-footer {
      padding: 1rem 1.25rem;
      border-top: 1px solid var(--border);
    }
    .admin-profile {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .admin-avatar {
      width: 34px; height: 34px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.8rem;
      color: var(--navy);
      flex-shrink: 0;
    }
    .admin-name { font-size: 0.85rem; font-weight: 600; }
    .admin-role { font-size: 0.7rem; color: var(--text-muted); }
    .btn-logout {
      margin-left: auto;
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 0.35rem 0.6rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.75rem;
      transition: all var(--transition);
      flex-shrink: 0;
    }
    .btn-logout:hover { border-color: var(--danger); color: var(--danger); }

    /* ── MAIN ── */
    .main { flex: 1; margin-left: 240px; display: flex; flex-direction: column; min-height: 100vh; }

    /* ── TOP BAR ── */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      background: color-mix(in srgb, var(--bg) 88%, transparent);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0.875rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .topbar-title { font-size: 1.1rem; font-weight: 600; }
    .topbar-subtitle { font-size: 0.8rem; color: var(--text-muted); }
    .topbar-actions { display: flex; align-items: center; gap: 0.75rem; }

    .notif-btn {
      position: relative;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      width: 36px; height: 36px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all var(--transition);
      font-size: 0.85rem;
    }
    .notif-btn:hover { color: var(--gold); border-color: var(--border-accent); }
    .notif-dot {
      position: absolute;
      top: 6px; right: 6px;
      width: 8px; height: 8px;
      background: var(--danger);
      border-radius: 50%;
      border: 2px solid var(--bg);
      display: none;
    }
    .notif-dot.visible { display: block; }

    /* ── CONTENT ── */
    .content { flex: 1; padding: 2rem; }

    .section { display: none; }
    .section.active { display: block; }

    /* ── STATS GRID ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
      transition: all var(--transition);
      cursor: default;
    }
    .stat-card:hover { border-color: var(--border-accent); transform: translateY(-2px); box-shadow: var(--shadow-admin); }
    .stat-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.75rem; }
    .stat-icon {
      width: 38px; height: 38px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem;
    }
    .si-gold { background: var(--gold-dim); color: var(--gold); }
    .si-blue { background: rgba(59,130,246,0.12); color: var(--info); }
    .si-green { background: rgba(34,197,94,0.12); color: var(--success); }
    .si-red { background: rgba(239,68,68,0.12); color: var(--danger); }
    .si-orange { background: rgba(245,158,11,0.12); color: var(--warning); }
    .si-purple { background: rgba(168,85,247,0.12); color: #a855f7; }

    .stat-badge {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 100px;
    }
    .badge-up { background: rgba(34,197,94,0.12); color: var(--success); }
    .badge-down { background: rgba(239,68,68,0.12); color: var(--danger); }
    .badge-neutral { background: rgba(107,114,128,0.15); color: var(--text-muted); }

    .stat-value {
      font-family: 'DM Mono', monospace;
      font-size: 1.75rem;
      font-weight: 500;
      color: var(--text);
      line-height: 1;
      margin-bottom: 0.25rem;
    }
    .stat-label { font-size: 0.8rem; color: var(--text-muted); }

    /* ── GRID ── */
    .two-col { display: grid; grid-template-columns: 2fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
    .three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }

    /* ── CARD ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    .card-header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .card-title { font-size: 0.9rem; font-weight: 600; display: flex; align-items: center; gap: 0.5rem; }
    .card-title i { color: var(--gold); font-size: 0.85rem; }
    .card-body { padding: 1.25rem; }
    .card-body.no-pad { padding: 0; }

    /* ── TABLE ── */
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th {
      text-align: left;
      padding: 0.75rem 1.25rem;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    .data-table td {
      padding: 0.875rem 1.25rem;
      font-size: 0.85rem;
      border-bottom: 1px solid rgba(255,255,255,0.02);
      vertical-align: middle;
    }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: rgba(255,255,255,0.015); }

    .cell-primary { font-weight: 600; }
    .cell-muted { color: var(--text-muted); font-size: 0.78rem; margin-top: 2px; }

    /* ── BADGES ── */
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 9px;
      border-radius: 100px;
      font-size: 0.72rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .badge-new { background: rgba(59,130,246,0.12); color: var(--info); }
    .badge-contacted { background: rgba(245,158,11,0.12); color: var(--warning); }
    .badge-converted { background: rgba(34,197,94,0.12); color: var(--success); }
    .badge-closed { background: rgba(107,114,128,0.12); color: var(--text-muted); }
    .badge-viewing { background: rgba(168,85,247,0.12); color: #a855f7; }
    .badge-pending { background: rgba(245,158,11,0.12); color: var(--warning); }
    .badge-confirmed { background: rgba(34,197,94,0.12); color: var(--success); }
    .badge-cancelled { background: rgba(239,68,68,0.12); color: var(--danger); }
    .badge-completed { background: rgba(59,130,246,0.12); color: var(--info); }
    .badge-active { background: rgba(34,197,94,0.12); color: var(--success); }
    .badge-inactive { background: rgba(107,114,128,0.12); color: var(--text-muted); }
    .badge-deposit_paid { background: rgba(168,85,247,0.12); color: #a855f7; }
    .badge-fully_paid { background: rgba(34,197,94,0.2); color: var(--success); }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.5rem 1rem;
      border-radius: var(--radius);
      font-weight: 600; font-size: 0.825rem;
      cursor: pointer; border: none;
      transition: all var(--transition);
      font-family: inherit;
      white-space: nowrap;
    }
    .btn-gold { background: linear-gradient(135deg, var(--gold), var(--gold-light)); color: var(--navy); }
    .btn-gold:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .btn-ghost { background: var(--surface2); color: var(--text-dim); border: 1px solid var(--border); }
    .btn-ghost:hover { border-color: var(--border-accent); color: var(--gold); }
    .btn-danger-ghost { background: rgba(239,68,68,0.08); color: var(--danger); border: 1px solid rgba(239,68,68,0.2); }
    .btn-danger-ghost:hover { background: rgba(239,68,68,0.15); }
    .btn-success-ghost { background: rgba(34,197,94,0.08); color: var(--success); border: 1px solid rgba(34,197,94,0.2); }
    .btn-success-ghost:hover { background: rgba(34,197,94,0.15); }
    .btn-sm { padding: 0.35rem 0.75rem; font-size: 0.78rem; }
    .btn-icon { padding: 0.35rem; width: 30px; height: 30px; justify-content: center; }

    /* ── FORMS ── */
    .form-group { margin-bottom: 1rem; }
    .form-label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--text-dim); margin-bottom: 0.4rem; }
    .form-input, .form-select, .form-textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.625rem 0.875rem;
      color: var(--text);
      font-size: 0.875rem;
      outline: none;
      font-family: inherit;
      transition: border-color var(--transition);
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--border-accent); }
    .form-select option { background: var(--surface2); }
    .form-textarea { min-height: 80px; resize: vertical; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.875rem; }
    .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.875rem; }
    .form-check { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; font-size: 0.875rem; }
    .form-check input { accent-color: var(--gold); width: 16px; height: 16px; cursor: pointer; }

    /* ── SEARCH ── */
    .search-box {
      display: flex; align-items: center; gap: 0.625rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.5rem 0.875rem;
      transition: border-color var(--transition);
    }
    .search-box:focus-within { border-color: var(--border-accent); }
    .search-box i { color: var(--text-muted); font-size: 0.85rem; }
    .search-box input { background: none; border: none; color: var(--text); font-size: 0.875rem; outline: none; flex: 1; font-family: inherit; }
    .search-box input::placeholder { color: var(--text-muted); }

    /* ── TABS ── */
    .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); }
    .tab {
      padding: 0.7rem 1rem;
      color: var(--text-muted);
      font-size: 0.825rem;
      font-weight: 500;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all var(--transition);
      white-space: nowrap;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--gold); border-bottom-color: var(--gold); }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(8px);
      z-index: 1000;
      display: none; align-items: center; justify-content: center;
      padding: 1.5rem;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      width: 100%; max-width: 680px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 25px 60px rgba(0,0,0,0.6);
    }
    .modal-sm { max-width: 440px; }
    .modal-lead { 
      max-width: 600px; 
      width: 90%; 
      max-height: 90vh;
      animation: modalFadeIn 200ms ease-out;
    }
    .modal-lead.closing {
      animation: modalFadeOut 150ms ease-in forwards;
    }
    @keyframes modalFadeIn {
      from { opacity: 0; transform: scale(0.95) translateY(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    @keyframes modalFadeOut {
      from { opacity: 1; transform: scale(1) translateY(0); }
      to { opacity: 0; transform: scale(0.95) translateY(10px); }
    }
    @media (max-width: 768px) {
      .modal-lead { width: 95%; max-height: 95vh; }
    }
    @media (max-width: 480px) {
      .modal-lead { 
        width: 100%; 
        max-width: 100%; 
        max-height: 100vh;
        border-radius: 0;
        margin: 0;
      }
      .modal-overlay { padding: 0; align-items: flex-end; }
    }
    .lead-modal-header {
      border-bottom: none;
      padding-bottom: 0.5rem;
    }
    .lead-header-info {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    .lead-name {
      font-size: 1.5rem;
      font-weight: 700;
      margin: 0;
      color: var(--text);
    }
    .lead-status-badge {
      display: inline-flex;
      align-items: center;
      padding: 0.35rem 0.875rem;
      border-radius: 100px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .lead-status-badge.new { background: #dbeafe; color: #1e40af; }
    .lead-status-badge.contacted { background: #fef3c7; color: #92400e; }
    .lead-status-badge.viewing_scheduled { background: #e0e7ff; color: #3730a3; }
    .lead-status-badge.converted { background: #d1fae5; color: #065f46; }
    .lead-status-badge.closed { background: #f3f4f6; color: #4b5563; }
    
    /* Lead Cards */
    .lead-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }
    .lead-card-title {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      margin-bottom: 0.875rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .lead-card-content {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .lead-field {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
    }
    .lead-field-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--gold);
      font-size: 0.875rem;
      flex-shrink: 0;
    }
    .lead-field-content {
      flex: 1;
      min-width: 0;
    }
    .lead-field-label {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 2px;
    }
    .lead-field-value {
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text);
      word-break: break-word;
    }
    .lead-field-value a {
      color: var(--gold);
      text-decoration: none;
    }
    .lead-field-value a:hover { text-decoration: underline; }
    .lead-field-value.not-provided {
      color: #9ca3af;
      font-style: italic;
    }
    .lead-copy-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      font-size: 0.75rem;
      transition: all 0.2s;
    }
    .lead-copy-btn:hover {
      background: var(--surface);
      color: var(--gold);
    }
    
    /* Message Card - Most Prominent */
    .lead-message-card {
      background: #f0f7ff;
      border: 1px solid #dbeafe;
      border-left: 4px solid #3b82f6;
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }
    .lead-message-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #3b82f6;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .lead-message-text {
      font-size: 16px;
      line-height: 1.6;
      color: #1e3a5f;
      white-space: pre-wrap;
    }
    @media (min-width: 768px) {
      .lead-message-text { font-size: 17px; }
    }
    
    /* Metadata Grid */
    .lead-meta-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
    }
    @media (max-width: 480px) {
      .lead-meta-grid { grid-template-columns: 1fr; }
    }
    .lead-meta-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .lead-meta-label {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .lead-meta-value {
      font-size: 0.85rem;
      color: var(--text);
      word-break: break-all;
    }
    .lead-meta-value.not-provided {
      color: #9ca3af;
      font-style: italic;
    }
    
    /* Property Link Card */
    .lead-property-link {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.875rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      text-decoration: none;
      transition: all 0.2s;
    }
    .lead-property-link:hover {
      border-color: var(--gold);
      background: rgba(201, 168, 76, 0.05);
    }
    .lead-property-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: var(--gold-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--gold);
      font-size: 1rem;
    }
    .lead-property-info {
      flex: 1;
      min-width: 0;
    }
    .lead-property-name {
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .lead-property-meta {
      font-size: 0.75rem;
      color: var(--text-muted);
    }
    .lead-property-arrow {
      color: var(--text-muted);
      font-size: 0.875rem;
    }
    
    /* Lead Actions Section */
    .lead-actions {
      border-top: 1px solid var(--border);
      padding-top: 1.25rem;
      margin-top: 0.5rem;
    }
    .modal-header {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; background: var(--surface); z-index: 1;
    }
    .modal-title { font-size: 1rem; font-weight: 700; }
    .modal-close {
      background: none; border: none; color: var(--text-muted);
      font-size: 1.25rem; cursor: pointer; width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 8px; transition: all var(--transition);
    }
    .modal-close:hover { background: var(--surface2); color: var(--text); }
    .modal-body { padding: 1.5rem; }

    /* ── NOTIFICATIONS PANEL ── */
    .notif-panel {
      position: fixed; top: 60px; right: 1.5rem;
      width: 340px; max-height: 480px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-admin);

      display: none;
      flex-direction: column;
      overflow: hidden;
    }
    .notif-panel.active { display: flex; }
    .notif-panel-header {
      padding: 0.875rem 1rem;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .notif-panel-title { font-size: 0.875rem; font-weight: 700; }
    .notif-list { flex: 1; overflow-y: auto; }
    .notif-item {
      padding: 0.875rem 1rem;
      border-bottom: 1px solid rgba(255,255,255,0.02);
      cursor: pointer;
      transition: background var(--transition);
      display: flex; gap: 0.75rem; align-items: flex-start;
    }
    .notif-item:hover { background: rgba(255,255,255,0.02); }
    .notif-item.unread { background: var(--gold-dim); }
    .notif-icon {
      width: 32px; height: 32px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem; flex-shrink: 0;
    }
    .notif-content { flex: 1; min-width: 0; }
    .notif-title-text { font-size: 0.825rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .notif-msg { font-size: 0.775rem; color: var(--text-muted); margin-top: 2px; }
    .notif-time { font-size: 0.7rem; color: var(--text-muted); white-space: nowrap; }

    /* ── CHART BAR ── */
    .bar-chart { display: flex; flex-direction: column; gap: 0.625rem; }
    .bar-row { display: flex; align-items: center; gap: 0.75rem; }
    .bar-label { font-size: 0.78rem; color: var(--text-dim); min-width: 100px; text-transform: capitalize; }
    .bar-track { flex: 1; height: 7px; background: rgba(255,255,255,0.06); border-radius: 100px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 100px; background: linear-gradient(90deg, var(--gold), var(--gold-light)); transition: width 0.8s cubic-bezier(0.4,0,0.2,1); }
    .bar-count { font-size: 0.78rem; font-family: 'DM Mono', monospace; color: var(--text-muted); min-width: 30px; text-align: right; }

    /* ── FUNNEL ── */
    .funnel-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .funnel-row {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.625rem 0.875rem;
      background: var(--surface2);
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }
    .funnel-stage { font-size: 0.8rem; color: var(--text-dim); flex: 1; }
    .funnel-count { font-family: 'DM Mono', monospace; font-size: 0.875rem; font-weight: 500; min-width: 40px; text-align: right; }
    .funnel-rate { font-size: 0.72rem; color: var(--text-muted); min-width: 60px; text-align: right; }

    /* ── CHAT ── */
    .chat-layout { display: grid; grid-template-columns: 280px 1fr; height: 560px; }
    .chat-sessions { border-right: 1px solid var(--border); overflow-y: auto; }
    .chat-session-item {
      padding: 0.875rem 1rem;
      border-bottom: 1px solid rgba(255,255,255,0.02);
      cursor: pointer;
      transition: background var(--transition);
      display: flex; gap: 0.75rem; align-items: flex-start;
    }
    .chat-session-item:hover { background: rgba(255,255,255,0.02); }
    .chat-session-item.active { background: var(--gold-dim); }
    .session-avatar {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.875rem; font-weight: 600;
      color: var(--gold);
      flex-shrink: 0;
    }
    .session-info { flex: 1; min-width: 0; }
    .session-name { font-size: 0.85rem; font-weight: 600; }
    .session-preview { font-size: 0.75rem; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .session-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
    .session-time { font-size: 0.7rem; color: var(--text-muted); }
    .unread-count {
      background: var(--danger); color: white;
      font-size: 0.65rem; font-weight: 700;
      padding: 1px 5px; border-radius: 100px;
      min-width: 16px; text-align: center;
    }

    .chat-main { display: flex; flex-direction: column; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.75rem; }
    .chat-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-muted); gap: 0.75rem; }
    .chat-empty i { font-size: 2rem; opacity: 0.4; }

    .msg-bubble { display: flex; gap: 0.5rem; max-width: 70%; }
    .msg-bubble.admin { align-self: flex-end; flex-direction: row-reverse; }
    .msg-content {
      padding: 0.625rem 0.875rem;
      border-radius: 14px;
      font-size: 0.85rem;
      line-height: 1.4;
    }
    .msg-bubble:not(.admin) .msg-content { background: var(--surface2); border-bottom-left-radius: 4px; }
    .msg-bubble.admin .msg-content { background: linear-gradient(135deg, var(--gold), var(--gold-light)); color: var(--navy); font-weight: 500; border-bottom-right-radius: 4px; }
    .msg-time { font-size: 0.65rem; color: var(--text-muted); align-self: flex-end; margin-bottom: 2px; }

    .chat-input-area {
      padding: 0.875rem;
      border-top: 1px solid var(--border);
      display: flex; gap: 0.625rem;
    }

    /* ── BOOKING CARD ── */
    .booking-row-detail { padding: 0.75rem 1.25rem; background: var(--surface2); border-radius: var(--radius); margin-bottom: 0.5rem; }
    .booking-row-detail .label { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 2px; }
    .booking-row-detail .value { font-size: 0.875rem; font-weight: 600; }

    /* ── AUDIT LOG ── */
    .audit-item {
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid rgba(255,255,255,0.02);
      display: flex; align-items: flex-start; gap: 0.75rem;
    }
    .audit-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
    .audit-content { flex: 1; }
    .audit-action { font-size: 0.825rem; font-weight: 600; }
    .audit-detail { font-size: 0.775rem; color: var(--text-muted); }
    .audit-time { font-size: 0.7rem; color: var(--text-muted); white-space: nowrap; }

    /* ── EMPTY STATE ── */
    .empty-state { padding: 3rem; text-align: center; color: var(--text-muted); }
    .empty-state i { font-size: 2rem; margin-bottom: 0.75rem; opacity: 0.35; display: block; }
    .empty-state p { font-size: 0.875rem; }

    /* ── LOADING ── */
    .loading { display: flex; align-items: center; justify-content: center; padding: 3rem; }
    .spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── TOOLBAR ── */
    .toolbar { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .toolbar .search-box { flex: 1; min-width: 200px; }

    /* ── TOAST ── */
    .toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9999; display: flex; flex-direction: column; gap: 0.5rem; }
    .toast {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem 1rem;
      display: flex; align-items: center; gap: 0.75rem;
      font-size: 0.85rem; min-width: 260px;
      animation: slideIn 0.3s ease; box-shadow: var(--shadow-admin);
    }
    .toast.success { border-color: rgba(34,197,94,0.3); }
    .toast.error { border-color: rgba(239,68,68,0.3); }
    .toast i { font-size: 1rem; }
    .toast.success i { color: var(--success); }
    .toast.error i { color: var(--danger); }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: none; opacity: 1; } }

    /* ── LOGIN PAGE ── */
    .login-page {
      min-height: 100vh;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 2.5rem;
      width: 100%; max-width: 380px;
      box-shadow: var(--shadow-admin);
    }
    .login-logo { text-align: center; margin-bottom: 2rem; }
    .login-logo .logo-text { font-size: 2rem; justify-content: center; flex-direction: column; gap: 0.75rem; }
    .login-logo .logo-text img { width: 86px; height: 86px; border-radius: 16px; }
    .login-logo p { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.25rem; }
    .login-error { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); border-radius: var(--radius); padding: 0.625rem 0.875rem; font-size: 0.825rem; color: var(--danger); margin-bottom: 1rem; display: none; }

    /* ── RESPONSIVE ── */
    @media (max-width: 1100px) { .two-col { grid-template-columns: 1fr; } .three-col { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 900px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: none; }
      .main { margin-left: 0; }
      .chat-layout { grid-template-columns: 1fr; height: auto; }
    }
    @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } .stats-grid { grid-template-columns: 1fr 1fr; } .three-col { grid-template-columns: 1fr; } }
  /* ── TASK BOARD ── */
.task-board { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; overflow-x: auto; }
@media (max-width: 1200px) {
  .task-board { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 768px) {
  .task-board { grid-template-columns: repeat(4, 280px); gap: 0.75rem; padding-bottom: 0.5rem; }
}
.task-column { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1rem; min-height: 400px; display: flex; flex-direction: column; }
.task-column.drag-over { background: rgba(201, 168, 76, 0.1); border-color: var(--gold); }
.task-column-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--border); }
.task-column-header h4 { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); }
.task-column-header span { background: var(--surface); padding: 2px 8px; border-radius: 100px; font-size: 0.7rem; font-weight: 600; color: var(--text-dim); }
.task-column-content { flex: 1; min-height: 100px; }

.task-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; margin-bottom: 0.75rem; cursor: grab; transition: all var(--transition); border-left: 3px solid var(--gold); position: relative; }
.task-card:hover { border-color: var(--border-accent); transform: translateY(-2px); box-shadow: var(--shadow-admin); }
.task-card.dragging { opacity: 0.5; cursor: grabbing; transform: rotate(2deg); }
.task-card.priority-urgent { border-left-color: var(--danger); border-left-width: 4px; }
.task-card.priority-high { border-left-color: var(--warning); border-left-width: 4px; }
.task-card.priority-medium { border-left-color: var(--info); }
.task-card.priority-low { border-left-color: var(--success); }
.task-card.due-overdue { border-color: var(--danger); box-shadow: 0 0 0 1px var(--danger); }
.task-card.due-soon { border-color: #f59e0b; box-shadow: 0 0 0 1px #f59e0b; }
.task-card h5 { font-size: 0.875rem; font-weight: 600; margin-bottom: 0.5rem; color: var(--text); }
.task-card p { font-size: 0.78rem; color: var(--text-muted); margin-bottom: 0.75rem; line-height: 1.4; }

.task-card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 0.5rem; margin-bottom: 0.5rem; }
.task-priority-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.task-priority-dot.urgent { background: #dc2626; }
.task-priority-dot.high { background: #ea580c; }
.task-priority-dot.medium { background: #2563eb; }
.task-priority-dot.low { background: #16a34a; }

.task-assignee { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.5rem; }
.task-assignee-avatar { width: 24px; height: 24px; border-radius: 50%; background: var(--gold-dim); display: flex; align-items: center; justify-content: center; font-size: 0.65rem; font-weight: 600; color: var(--gold); }
.task-assignee-name { font-size: 0.7rem; color: var(--text-muted); }

.task-due-date { display: flex; align-items: center; gap: 0.35rem; font-size: 0.7rem; margin-top: 0.5rem; }
.task-due-date.overdue { color: var(--danger); }
.task-due-date.soon { color: #f59e0b; }
.task-due-date.upcoming { color: var(--text-muted); }

.task-meta { display: flex; justify-content: space-between; align-items: center; font-size: 0.7rem; color: var(--text-muted); margin-top: 0.75rem; padding-top: 0.5rem; border-top: 1px solid var(--border); }
.task-meta .creator { color: var(--gold); font-weight: 500; }
.task-completed { margin-top: 0.5rem; padding-top: 0.5rem; border-top: 1px solid var(--border); font-size: 0.7rem; color: var(--success); }
.task-actions { display: flex; gap: 0.4rem; margin-top: 0.75rem; }
.task-actions .btn { padding: 0.25rem 0.5rem; font-size: 0.7rem; }

/* Task Filters */
.task-filters { display: flex; gap: 0.75rem; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; }
.task-filters select { min-width: 140px; }

/* Undo Button */
.task-undo-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted); padding: 0.25rem 0.5rem; border-radius: var(--radius); font-size: 0.7rem; cursor: pointer; transition: all 0.2s; }
.task-undo-btn:hover { background: var(--gold-dim); color: var(--gold); border-color: var(--gold); }
.team-avatar { width: 32px; height: 32px; border-radius: 8px; background: linear-gradient(135deg, var(--gold), var(--gold-light)); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.75rem; color: var(--navy); }
.notif-item { cursor: pointer; }
.notif-item.unread { background: var(--gold-dim); }
.notif-item:hover { background: rgba(255,255,255,0.03); }

<body>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<!-- Notification Sound -->
<audio id="notifSound" preload="auto"><source src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" type="audio/mpeg"></audio>

<!-- Notification Panel -->
<div class="notif-panel" id="notifPanel">
  <div class="notif-panel-header">
    <span class="notif-panel-title">Notifications</span>
    <button class="btn btn-ghost btn-sm" onclick="markAllRead()">Mark all read</button>
  </div>
  <div class="notif-list" id="notifList">
    <div class="loading"><div class="spinner"></div></div>
  </div>
</div>

<!-- ── MODALS ── -->

<!-- Listing Modal -->
<div class="modal-overlay" id="listingModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="listingModalTitle">Add Listing</span>
      <button class="modal-close" onclick="closeModal('listingModal')">&times;</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="listingId">
      <div class="form-row">
        <div class="form-group" style="grid-column:1/-1">
          <label class="form-label">Title *</label>
          <input class="form-input" id="lTitle" required>
        </div>
        <div class="form-group" style="grid-column:1/-1">
          <label class="form-label">Description *</label>
          <textarea class="form-textarea" id="lDesc" required></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Price (RM) *</label>
          <input class="form-input" type="number" id="lPrice" required>
        </div>
        <div class="form-group">
          <label class="form-label">Period</label>
          <select class="form-select" id="lPeriod">
            <option value="month">Per Month</option>
            <option value="week">Per Week</option>
            <option value="day">Per Day</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Property Type *</label>
          <select class="form-select" id="lType">
            <option value="apartment">Apartment</option>
            <option value="studio">Studio</option>
            <option value="shared_room">Shared Room</option>
            <option value="private_room">Private Room</option>
            <option value="house">House</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">City *</label>
          <input class="form-input" id="lCity" value="Kuala Lumpur" required>
        </div>
        <div class="form-group">
          <label class="form-label">Area *</label>
          <input class="form-input" id="lArea" placeholder="e.g. Subang Jaya, Cheras" required>
        </div>
        <div class="form-group">
          <label class="form-label">University</label>
          <select class="form-input" id="lUniversity" onchange="autoPopulateArea()">
            <option value="">Select University</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Address</label>
          <input class="form-input" id="lAddress">
        </div>
        <div class="form-group">
          <label class="form-label">Bedrooms</label>
          <input class="form-input" type="number" id="lBedrooms" min="0">
        </div>
        <div class="form-group">
          <label class="form-label">Bathrooms</label>
          <input class="form-input" type="number" id="lBathrooms" min="0" step="0.5">
        </div>
        <div class="form-group">
          <label class="form-label">Max Occupants</label>
          <input class="form-input" type="number" id="lOccupants" min="1">
        </div>
        <div class="form-group">
          <label class="form-label">WhatsApp Number</label>
          <input class="form-input" id="lWhatsapp" placeholder="+601x...">
        </div>
        <div class="form-group" style="grid-column:1/-1">
          <label class="form-label">Amenities (comma separated)</label>
          <input class="form-input" id="lAmenities" placeholder="WiFi, Parking, Gym, Laundry...">
        </div>
        <div class="form-group" style="grid-column:1/-1">
          <label class="form-label">Image URLs (comma separated)</label>
          <input class="form-input" id="lImages" placeholder="https://...">
        </div>
        <div class="form-group">
          <label class="form-label">Available From</label>
          <input class="form-input" type="date" id="lFrom">
        </div>
        <div class="form-group">
          <label class="form-label">Available Until</label>
          <input class="form-input" type="date" id="lUntil">
        </div>
        <div class="form-group">
          <label class="form-check"><input type="checkbox" id="lActive" checked> Active</label>
        </div>
        <div class="form-group">
          <label class="form-check"><input type="checkbox" id="lFeatured"> Featured</label>
        </div>
      </div>
      <button class="btn btn-gold" style="width:100%;margin-top:0.5rem;" onclick="saveListing()">
        <i class="fas fa-save"></i> Save Listing
      </button>
    </div>
  </div>
</div>

<!-- Lead Modal -->
<div class="modal-overlay" id="leadModal">
  <div class="modal modal-lead">
    <div class="modal-header lead-modal-header">
      <div class="lead-header-info">
        <h2 class="lead-name" id="leadModalName">Lead Name</h2>
        <span class="lead-status-badge" id="leadModalStatus">new</span>
      </div>
      <button class="modal-close" onclick="closeModal('leadModal')">&times;</button>
    </div>
    <div class="modal-body lead-modal-body" id="leadModalBody"></div>
  </div>
</div>

<!-- Task Modal -->
<div class="modal-overlay" id="taskModal">
  <div class="modal modal-sm">
    <div class="modal-header">
      <span class="modal-title" id="taskModalTitle">New Task</span>
      <button class="modal-close" onclick="closeModal('taskModal')">&times;</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="taskId">
      <div class="form-group">
        <label class="form-label">Title *</label>
        <input class="form-input" id="taskTitle" required>
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea class="form-textarea" id="taskDesc" rows="3"></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Priority</label>
          <select class="form-select" id="taskPriority">
            <option value="low">Low</option>
            <option value="medium" selected>Medium</option>
            <option value="high">High</option>
            <option value="urgent">Urgent</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Status</label>
          <select class="form-select" id="taskStatus">
            <option value="todo" selected>To Do</option>
            <option value="in_progress">In Progress</option>
            <option value="review">Review</option>
            <option value="done">Done</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Category</label>
          <select class="form-select" id="taskCategory">
            <option value="general">General</option>
            <option value="listing">Listings</option>
            <option value="lead">Leads</option>
            <option value="booking">Bookings</option>
            <option value="chat">Chat</option>

// ── API ──
async function api(path, opts = {}) {
  const res = await fetch(path, {
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${S.token}`, ...opts.headers },
    ...opts
  });
  return res.json();
}

// ── TOAST ──
function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i><span>${msg}</span>`;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

async function login() {
  const u = document.getElementById('loginUser').value;

  try {
    const data = await api('/api/admin/login', { method: 'POST', body: JSON.stringify({ username: u, password: p }) });

      localStorage.setItem('adminToken', data.token);

      S.adminName = u.charAt(0).toUpperCase() + u.slice(1);
      localStorage.setItem('adminName', S.adminName);

localStorage.setItem('adminId', S.adminId);

      document.getElementById('loginError').style.display = 'block';
      document.getElementById('loginError').textContent = 'Invalid credentials. Please try again.';

}

function statCard(icon, iconClass, value, label, change, unit='') {
  let badge = '';
  if (change !== null && change !== undefined) {
    const n = parseFloat(change);
    const dir = n >= 0 ? 'up' : 'down';
    badge = `<span class="stat-badge badge-${dir}"><i class="fas fa-arrow-${dir}"></i> ${Math.abs(n)}${unit}</span>`;
  }
  return `
    <div class="stat-card">
      <div class="stat-row">
        <div class="stat-icon ${iconClass}"><i class="fas ${icon}"></i></div>
        ${badge}
      </div>
      <div class="stat-value">${value ?? '-'}</div>
      <div class="stat-label">${label}</div>
    </div>
  `;
}

async function loadListings() {
  const sec = document.getElementById('sec-listings');
  sec.innerHTML = `
    <div class="toolbar" style="margin-bottom:1rem;">
      <div class="search-box"><i class="fas fa-search"></i><input placeholder="Search listings..." oninput="filterListings(this.value)" id="listingSearch"></div>
      <select class="form-select" style="width:160px;" onchange="filterListings()">
        <option value="">All Types</option>
        <option value="apartment">Apartment</option>
        <option value="studio">Studio</option>
        <option value="shared_room">Shared Room</option>
        <option value="private_room">Private Room</option>
        <option value="house">House</option>
      </select>
      <button class="btn btn-gold" onclick="openListingModal()"><i class="fas fa-plus"></i> Add Listing</button>
    </div>
    <div class="card">
      <div class="card-body no-pad">
        <table class="data-table">
          <thead><tr><th>Property</th><th>Type</th><th>Price</th><th>Location</th><th>Views</th><th>Inquiries</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody id="listingsBody"><tr><td colspan="8"><div class="loading"><div class="spinner"></div></div></td></tr></tbody>
        </table>
      </div>

  `;
  const data = await api('/api/listings?isActive=true');
  S.listings = data.data || [];
  renderListingsBody(S.listings);
}

function renderListingsBody(list) {
  const tbody = document.getElementById('listingsBody');
  if (!tbody) return;
  if (!list.length) { tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><i class="fas fa-building"></i><p>No listings found</p></div></td></tr>`; return; }
  tbody.innerHTML = list.map(l => `
    <tr>
      <td><div class="cell-primary">${l.title}</div><div class="cell-muted">${l.agentName||''}</div></td>
      <td><span style="text-transform:capitalize;font-size:0.8rem;color:var(--text-dim);">${l.propertyType?.replace('_',' ')}</span></td>
      <td style="font-family:'DM Mono',monospace;font-size:0.82rem;">RM ${l.price}/${l.pricePeriod}</td>
      <td style="font-size:0.82rem;color:var(--text-muted);">${l.location?.city||'-'}</td>
      <td style="font-family:'DM Mono',monospace;font-size:0.82rem;">${l.views}</td>
      <td style="font-family:'DM Mono',monospace;font-size:0.82rem;">${l.inquiries}</td>
      <td>${l.isActive ? '<span class="badge badge-active">Active</span>' : '<span class="badge badge-inactive">Inactive</span>'}</td>
      <td>
        <div style="display:flex;gap:4px;">
          <button class="btn btn-ghost btn-sm btn-icon" onclick="editListing('${l._id}')" title="Edit"><i class="fas fa-edit"></i></button>
          <button class="btn btn-danger-ghost btn-sm btn-icon" onclick="deleteListing('${l._id}')" title="Delete"><i class="fas fa-trash"></i></button>
        </div>
      </td>
    </tr>
  `).join('');
}

function filterListings(search) {
  const q = (search || document.getElementById('listingSearch')?.value || '').toLowerCase();
  renderListingsBody(S.listings.filter(l => !q || l.title?.toLowerCase().includes(q) || l.location?.city?.toLowerCase().includes(q)));
}

async function openListingModal(l = null) {
  document.getElementById('listingModalTitle').textContent = l ? 'Edit Listing' : 'Add Listing';
  document.getElementById('listingId').value = l?._id || '';
  const set = (id, v) => { const el = document.getElementById(id); if (el) el.value = v ?? ''; };
  set('lTitle', l?.title); set('lDesc', l?.description); set('lPrice', l?.price);
  set('lPeriod', l?.pricePeriod || 'month'); set('lType', l?.propertyType || 'apartment');
  set('lCity', l?.location?.city); set('lArea', l?.location?.area); set('lUniversity', l?.location?.university);
  set('lAddress', l?.location?.address); set('lBedrooms', l?.bedrooms);
  set('lBathrooms', l?.bathrooms); set('lOccupants', l?.maxOccupants);
  set('lWhatsapp', l?.whatsappNumber);
  set('lAmenities', (l?.amenities || []).join(', '));
  set('lImages', (l?.images || []).join(', '));
  set('lFrom', l?.availableFrom?.split('T')[0]); set('lUntil', l?.availableUntil?.split('T')[0]);
  document.getElementById('lActive').checked = l ? l.isActive : true;
  document.getElementById('lFeatured').checked = l?.isFeatured || false;
  await loadUniversities(); // Load university dropdown
  openModal('listingModal');
}

function editListing(id) { openListingModal(S.listings.find(l => l._id === id)); }

async function saveListing() {
  const id = document.getElementById('listingId').value;
  const body = {
    title: document.getElementById('lTitle').value,
    description: document.getElementById('lDesc').value,
    price: parseInt(document.getElementById('lPrice').value),
    pricePeriod: document.getElementById('lPeriod').value,
    propertyType: document.getElementById('lType').value,
    location: { city: document.getElementById('lCity').value, area: document.getElementById('lArea').value, university: document.getElementById('lUniversity').value, address: document.getElementById('lAddress').value },
    bedrooms: parseInt(document.getElementById('lBedrooms').value)||0,
    bathrooms: parseFloat(document.getElementById('lBathrooms').value)||0,
    maxOccupants: parseInt(document.getElementById('lOccupants').value)||1,
    whatsappNumber: document.getElementById('lWhatsapp').value,
    amenities: document.getElementById('lAmenities').value.split(',').map(s=>s.trim()).filter(Boolean),
    images: document.getElementById('lImages').value.split(',').map(s=>s.trim()).filter(Boolean),
    availableFrom: document.getElementById('lFrom').value,
    availableUntil: document.getElementById('lUntil').value,
    isActive: document.getElementById('lActive').checked,
    isFeatured: document.getElementById('lFeatured').checked
  };
  try {
    const r = await api(id ? `/api/listings/${id}` : '/api/listings', { method: id ? 'PUT' : 'POST', body: JSON.stringify(body) });
    if (r.success) { closeModal('listingModal'); toast('Listing saved!'); loadListings(); }
    else toast(r.error || 'Error saving listing', 'error');
  } catch { toast('Error saving listing', 'error'); }
}

async function deleteListing(id) {
  if (!confirm('Delete this listing? This cannot be undone.')) return;
  const r = await api(`/api/listings/${id}`, { method: 'DELETE' });
  if (r.success) { toast('Listing deleted'); loadListings(); }
  else toast('Error deleting listing', 'error');
}

let universityAreaMap = {}; // Cache for university to area mapping

async function loadUniversities() {
  try {
    const r = await api('/api/listings/lookup/universities');
    if (r.success && r.data?.universities) {
      universityAreaMap = r.data.map || {};
      const select = document.getElementById('lUniversity');
      const currentValue = select.value;
      
      // Build options
      let options = '<option value="">Select University</option>';
      r.data.universities.forEach(uni => {
        options += `<option value="${uni}">${uni}</option>`;
      });
      select.innerHTML = options;
      
      // Restore selection if editing
      if (currentValue) select.value = currentValue;
    }

function autoPopulateArea() {

function viewLead(id) {
  const l = S.leads.find(x => x._id === id);
  if (!l) return;
  
  // Update header
  document.getElementById('leadModalName').textContent = l.name;
  const statusBadge = document.getElementById('leadModalStatus');
  statusBadge.textContent = l.status;
  statusBadge.className = `lead-status-badge ${l.status}`;
  
  // Helper to format value or show "Not provided"
  const val = (v) => v ? `<span class="lead-field-value">${v}</span>` : `<span class="lead-field-value not-provided">Not provided</span>`;
  const valMeta = (v) => v ? `<span class="lead-meta-value">${v}</span>` : `<span class="lead-meta-value not-provided">Not provided</span>`;
  
  // Format date: "23 May 2026"
  const fmtDateLong = (d) => {
    if (!d) return null;
    const date = new Date(d);
    return date.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
  };
  
  // Copy to clipboard function
  const copyBtn = (text) => `<button class="lead-copy-btn" onclick="navigator.clipboard.writeText('${text}');toast('Copied!')" title="Copy"><i class="fas fa-copy"></i></button>`;
  
  // Clean message - remove metadata prefixes like "Enquiry for..." and "Move-in:..."
  const cleanMessage = (msg) => {
    if (!msg) return '';
    // Remove patterns like 'Enquiry for "trial". Move-in: 2026-05-28.'
    let cleaned = msg.replace(/Enquiry for\s+["'][^"']+["']\.?\s*/gi, '');
    cleaned = cleaned.replace(/Move-in:\s*\d{4}-\d{2}-\d{2}\.?\s*/gi, '');
    cleaned = cleaned.trim();
    return cleaned;
  };
  
  document.getElementById('leadModalBody').innerHTML = `
    <!-- Contact Card -->
    <div class="lead-card">
      <div class="lead-card-title"><i class="fas fa-user"></i> Contact Information</div>
      <div class="lead-card-content">
        <div class="lead-field">
          <div class="lead-field-icon"><i class="fas fa-user"></i></div>
          <div class="lead-field-content">
            <div class="lead-field-label">Name</div>

        </div>
        <div class="lead-field">
          <div class="lead-field-icon"><i class="fas fa-envelope"></i></div>
          <div class="lead-field-content">
            <div class="lead-field-label">Email</div>
            ${l.email ? `<span class="lead-field-value"><a href="mailto:${l.email}">${l.email}</a></span> ${copyBtn(l.email)}` : val(null)}
          </div>
        </div>
        <div class="lead-field">
          <div class="lead-field-icon"><i class="fas fa-phone"></i></div>
          <div class="lead-field-content">
            <div class="lead-field-label">Phone</div>
            ${l.phone ? `<span class="lead-field-value">${l.phone}</span> ${copyBtn(l.phone)}` : val(null)}
          </div>
        </div>
        <div class="lead-field">
          <div class="lead-field-icon"><i class="fas fa-graduation-cap"></i></div>
          <div class="lead-field-content">
            <div class="lead-field-label">University</div>
            ${val(l.university)}
          </div>
        </div>
      </div>
    </div>
    
    <!-- Property Card (if applicable) -->
    ${l.listingId ? `
    <div class="lead-card">
      <div class="lead-card-title"><i class="fas fa-home"></i> Property Interest</div>
      <a href="/listing.html?id=${l.listingId}" target="_blank" class="lead-property-link">
        <div class="lead-property-icon"><i class="fas fa-building"></i></div>
        <div class="lead-property-info">
          <div class="lead-property-name">${l.listingTitle || 'View Property'}</div>
          <div class="lead-property-meta">Click to view listing details</div>
        </div>
        <div class="lead-property-arrow"><i class="fas fa-chevron-right"></i></div>
      </a>
    </div>
    ` : ''}
    
    <!-- Message Card - Most Prominent -->
    ${l.message && cleanMessage(l.message) ? `
    <div class="lead-message-card">
      <div class="lead-message-label"><i class="fas fa-comment-dots"></i> Visitor's Message</div>
      <div class="lead-message-text">${cleanMessage(l.message)}</div>
    </div>
    ` : ''}
    
    <!-- Dates -->
    <div style="display:flex;gap:1.5rem;justify-content:center;padding:0.5rem 0;font-size:0.75rem;color:var(--text-muted);">
      <span>${fmtDateLong(l.createdAt) || ''}</span>
      ${l.updatedAt && l.updatedAt !== l.createdAt ? `<span>${fmtDateLong(l.updatedAt)}</span>` : ''}
    </div>
    
    <!-- Actions Section -->
    <div class="lead-actions">
      <div class="form-group">
        <label class="form-label">Status</label>

async function loadChatSessions() {
  const data = await api('/api/chat/admin/sessions');
  const sessions = data.data || [];
  const container = document.getElementById('chatSessions');
  if (!container) return;

  const totalUnread = sessions.reduce((a, s) => a + (s.unreadCount || 0), 0);
  const badge = document.getElementById('chatBadge');
  if (badge) { badge.textContent = totalUnread; badge.style.display = totalUnread > 0 ? '' : 'none'; }

  if (!sessions.length) { container.innerHTML = `<div class="empty-state"><i class="fas fa-comments"></i><p>No conversations yet</p></div>`; return; }
  container.innerHTML = sessions.map(s => `
    <div class="chat-session-item ${S.currentSession===s._id?'active':''}" onclick="openSession('${s._id}','${(s.name||'Anonymous').replace(/'/g,"\\'")}')">
      <div class="session-avatar">${(s.name||'A').charAt(0).toUpperCase()}</div>
      <div class="session-info">
        <div class="session-name">${s.name||'Anonymous'}</div>
        <div class="session-preview">${s.lastMessage||'...'}</div>
      </div>
      <div class="session-meta">
        <div class="session-time">${fmtTime(s.lastMessageAt)}</div>
        ${s.unreadCount>0?`<div class="unread-count">${s.unreadCount}</div>`:''}
      </div>
    </div>
  `).join('');
}

async function openSession(id, name) {
  S.currentSession = id;
  document.getElementById('chatHeaderName').textContent = name;
  document.getElementById('chatInputArea').style.display = 'flex';
  await loadMessages(id);
  await api(`/api/chat/read/${id}`, { method: 'PUT' });
  loadChatSessions();
}

async function loadMessages(sessionId) {
  const data = await api(`/api/chat/${sessionId}`);
  const container = document.getElementById('chatMessages');
  if (!container) return;
  const msgs = data.data || [];
  if (!msgs.length) { container.innerHTML = `<div class="chat-empty"><i class="fas fa-comment-slash"></i><span>No messages yet</span></div>`; return; }
  container.innerHTML = msgs.map(m => `
    <div class="msg-bubble ${m.isAdmin?'admin':''}">
      <div class="msg-content">${m.message}</div>
      <div class="msg-time">${fmtTime(m.createdAt)}</div>
    </div>
  `).join('');
  container.scrollTop = container.scrollHeight;
}

async function sendReply() {
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if (!msg || !S.currentSession) return;
  input.value = '';
  await api('/api/chat', { method: 'POST', body: JSON.stringify({ sessionId: S.currentSession, message: msg, isAdmin: true }) });
  await loadMessages(S.currentSession);
}

async function exportLeads() {

  a.download = `leads-export-${Date.now()}.csv`;
  a.click();
  toast(`Exported ${data.count} leads`);
}

// ── NOTIFICATIONS ──
async function pollNotifications() {
  try {
    const data = await api('/api/notifications/recent');
    const newNotifs = data.data || [];
    const unreadCount = data.unreadCount || 0;
    
    // Track previous unread count to detect new notifications
    const prevUnread = S.notifications._unreadCount || 0;
    
    // Play sound if new unread notifications arrived
    if (unreadCount > prevUnread && prevUnread > 0) {
      const sound = document.getElementById('notifSound');
      if (sound) sound.play().catch(() => {});
    }
    
    // Store unread count on the array for next poll
    newNotifs._unreadCount = unreadCount;
    S.notifications = newNotifs;
    
    const dot = document.getElementById('notifDot');
    if (dot) dot.classList.toggle('visible', unreadCount > 0);
    renderNotifPanel();
  } catch {}
}

function renderNotifPanel() {
  const list = document.getElementById('notifList');
  if (!list) return;
  if (!S.notifications.length) { list.innerHTML = `<div class="empty-state"><i class="fas fa-bell-slash"></i><p>No notifications</p></div>`; return; }
  list.innerHTML = S.notifications.map(n => `
    <div class="notif-item ${!n.isRead?'unread':''}" onclick="handleNotifClick('${n._id}', '${(n.data?.leadId||'').toString().replace(/'/g, "\\'")}')">
      <div class="notif-icon si-gold" style="background:var(--gold-dim);color:var(--gold);width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        <i class="fas ${notifIcon(n.type)}" style="font-size:0.75rem;"></i>
      </div>
      <div class="notif-content">
        <div class="notif-title-text">${n.title}</div>
        <div class="notif-msg">${n.message}</div>
      </div>
      <div class="notif-time">${timeAgo(n.createdAt)}</div>
    </div>
  `).join('');
}

async function handleNotifClick(id, leadId) {
  // Mark as read first
  await markRead(id);
  
  // If notification has a leadId in data, navigate to leads section and open that lead
  if (leadId && leadId !== 'undefined' && leadId !== 'null') {
    // Close notification panel
    document.getElementById('notifPanel').classList.remove('active');
    
    // Switch to leads section
    showSection('leads');
    
    // Wait for leads to load, then open the lead modal
    setTimeout(() => {
      viewLead(leadId);
    }, 500);
  }
}

async function markRead(id) {
  await api(`/api/notifications/${id}/read`, { method: 'PUT' });

  const panel = document.getElementById('notifPanel');

function cap(s) { return s ? s.replace(/_/g,' ').replace(/\b\w/g, c=>c.toUpperCase()) : ''; }
function fmtDate(d) { return d ? new Date(d).toLocaleDateString('en-MY', { day:'2-digit', month:'short', year:'numeric' }) : '-'; }
function fmtTime(d) { return d ? new Date(d).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' }) : '-'; }
function timeAgo(d) {
  const diff = Date.now() - new Date(d).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 1) return 'just now';
  if (m < 60) return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h ago`;
  return fmtDate(d);
}

function statusBadge(s) {
  const map = { new:'badge-new', contacted:'badge-contacted', converted:'badge-converted', closed:'badge-closed', viewing_scheduled:'badge-viewing', pending:'badge-pending', confirmed:'badge-confirmed', cancelled:'badge-cancelled', completed:'badge-completed', deposit_paid:'badge-deposit_paid', fully_paid:'badge-fully_paid' };
  return `<span class="badge ${map[s]||'badge-neutral'}">${cap(s)}</span>`;
}

function renderBarChart(items, countKey, labelKey = '_id') {
  if (!items.length) return '<div class="empty-state" style="padding:1rem;"><p>No data</p></div>';
  const max = Math.max(...items.map(i => i[countKey]||0), 1);
  return items.map(i => `
    <div class="bar-row">
      <span class="bar-label">${i[labelKey]||'Unknown'}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${((i[countKey]||0)/max)*100}%"></div></div>
      <span class="bar-count">${i[countKey]||0}</span>
    </div>
  `).join('');
}

function renderTrendBars(trends) {
  if (!trends.length) return '<div style="color:var(--text-muted);font-size:0.85rem;padding:1rem;">No trend data</div>';
  const max = Math.max(...trends.map(t => t.count), 1);
  return trends.map(t => `
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;" title="${t._id}: ${t.count}">
      <div style="font-size:0.6rem;color:var(--text-muted);">${t.count||''}</div>
      <div style="width:100%;background:linear-gradient(180deg,var(--gold-light),var(--gold));border-radius:3px 3px 0 0;height:${Math.max((t.count/max)*140,2)}px;transition:height 0.5s;"></div>
      <div style="font-size:0.55rem;color:var(--text-muted);transform:rotate(-45deg);margin-top:4px;">${(t._id||'').slice(5)}</div>
    </div>
  `).join('');
}

function auditColor(action) {
  if (!action) return 'var(--text-muted)';
  if (action.includes('DELETE') || action.includes('delete')) return 'var(--danger)';
  if (action.includes('CREATE') || action.includes('create')) return 'var(--success)';
  if (action.includes('UPDATE') || action.includes('update')) return 'var(--info)';
  return 'var(--gold)';
}

function notifIcon(type) {
  const map = { new_booking:'calendar-plus', lead_status_change:'user-check', booking_status:'calendar-check', system:'cog', new_lead:'user-plus', new_chat:'comment-dots', listing_view_milestone:'eye' };
  return map[type] || 'bell';
}

async function fetchAndRenderTasks() {
  try {
    let url = '/api/tasks';
    const params = [];
    if (S.taskFilters.assignee) params.push(`assignedTo=${S.taskFilters.assignee}`);
    if (S.taskFilters.priority) params.push(`priority=${S.taskFilters.priority}`);
    if (S.taskFilters.dueDateFrom) params.push(`dueDateFrom=${S.taskFilters.dueDateFrom}`);
    if (S.taskFilters.dueDateTo) params.push(`dueDateTo=${S.taskFilters.dueDateTo}`);
    if (params.length) url += '?' + params.join('&');
    
    const data = await api(url);
    S.allTasks = data.data || [];
    renderTaskBoard();
  } catch (e) {
    console.error('Failed to fetch tasks', e);
  }

  S.taskFilters.assignee = document.getElementById('filterAssignee').value;
  S.taskFilters.priority = document.getElementById('filterPriority').value;
  S.taskFilters.dueDateFrom = document.getElementById('filterDueFrom').value;
  S.taskFilters.dueDateTo = document.getElementById('filterDueTo').value;

function clearTaskFilters() {
  document.getElementById('filterAssignee').value = '';
  document.getElementById('filterPriority').value = '';
  document.getElementById('filterDueFrom').value = '';
  document.getElementById('filterDueTo').value = '';
  S.taskFilters = { assignee: '', priority: '', dueDateFrom: '', dueDateTo: '' };
  fetchAndRenderTasks();
}

function renderTaskBoard() {
  const tasks = S.allTasks;
  const columns = ['todo', 'in_progress', 'review', 'done'];
  const titles = { todo: 'To Do', in_progress: 'In Progress', review: 'Review', done: 'Done' };
  
  // Helper to check due date status
  const getDueStatus = (dueDate) => {
    if (!dueDate) return null;
    const now = new Date();
    const due = new Date(dueDate);
    const hoursUntil = (due - now) / (1000 * 60 * 60);
    if (hoursUntil < 0) return 'overdue';
    if (hoursUntil <= 24) return 'soon';
    return 'upcoming';
  };
  
  const getDueClass = (status) => {
    if (status === 'overdue') return 'due-overdue';
    if (status === 'soon') return 'due-soon';
    return '';
  };
  
  const formatDueDate = (dueDate) => {
    if (!dueDate) return '';
    const date = new Date(dueDate);
    return date.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
  };
  
  document.getElementById('taskBoard').innerHTML = columns.map(col => `
    <div class="task-column" 
         data-status="${col}"
         ondragover="handleTaskDragOver(event)" 
         ondragleave="handleTaskDragLeave(event)"
         ondrop="handleTaskDrop(event, '${col}')">
      <div class="task-column-header">
        <h4>${titles[col]}</h4>
        <span id="count-${col}">${tasks.filter(t => t.status === col).length}</span>
      </div>
      <div class="task-column-content" id="column-${col}">
        ${tasks.filter(t => t.status === col).map(t => {
          const dueStatus = getDueStatus(t.dueDate);
          const dueClass = getDueClass(dueStatus);
          const assignee = t.assignedTo;
          const assigneeInitials = assignee?.name ? assignee.name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2) : (assignee?.username?.substring(0, 2).toUpperCase() || '?');
          
          return `
          <div class="task-card priority-${t.priority} ${dueClass}" 
               draggable="true"
               data-task-id="${t._id}"
               ondragstart="handleTaskDragStart(event, '${t._id}')"
               ondragend="handleTaskDragEnd(event)"
               onclick="editTask('${t._id}')">
            <div class="task-card-header">
              <h5>${t.title}</h5>
              <div class="task-priority-dot ${t.priority}"></div>
            </div>
            <p>${t.description?.substring(0, 80) || ''}${t.description?.length > 80 ? '...' : ''}</p>
            
            ${t.dueDate ? `
            <div class="task-due-date ${dueStatus}">
              <i class="fas fa-calendar-alt"></i>
              <span>${formatDueDate(t.dueDate)}</span>
              ${dueStatus === 'overdue' ? '<span style="margin-left:0.25rem;">(Overdue)</span>' : ''}
              ${dueStatus === 'soon' ? '<span style="margin-left:0.25rem;">(Due soon)</span>' : ''}
            </div>
            ` : ''}
            
            ${assignee ? `
            <div class="task-assignee">
              <div class="task-assignee-avatar">${assigneeInitials}</div>
              <span class="task-assignee-name">${assignee.name || assignee.username}</span>
            </div>
            ` : ''}
            
            <div class="task-meta">
              <span class="creator">By ${t.createdBy?.name || t.createdBy?.username}</span>
              <span style="text-transform:capitalize;">${t.priority}</span>
            </div>
            
            ${t.status === 'done' ? `
              <div style="margin-top:0.5rem;display:flex;justify-content:space-between;align-items:center;">
                <span class="task-completed">
                  <i class="fas fa-check-circle"></i> Completed
                </span>
                <button class="task-undo-btn" onclick="event.stopPropagation();undoCompleteTask('${t._id}')">
                  <i class="fas fa-undo"></i> Undo
                </button>
              </div>
            ` : ''}
          </div>
        `}).join('') || '<p style="color:var(--text-muted);font-size:0.8rem;text-align:center;padding:1rem;">No tasks</p>'}
      </div>
    </div>
  `).join('');
}

// Drag and Drop handlers
let draggedTaskId = null;

function handleTaskDragStart(e, taskId) {
  draggedTaskId = taskId;
  e.target.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', taskId);
}

function handleTaskDragEnd(e) {
  e.target.classList.remove('dragging');
  draggedTaskId = null;
  // Remove all drag-over classes
  document.querySelectorAll('.task-column').forEach(col => col.classList.remove('drag-over'));
}

function handleTaskDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drag-over');
}

function handleTaskDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}

async function handleTaskDrop(e, newStatus) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  
  const taskId = e.dataTransfer.getData('text/plain') || draggedTaskId;
  if (!taskId) return;
  
  const task = S.allTasks.find(t => t._id === taskId);
  if (!task || task.status === newStatus) return;
  
  try {
    const r = await api(`/api/tasks/${taskId}/status`, { 
      method: 'PATCH', 
      body: JSON.stringify({ status: newStatus }) 
    });
    if (r.success) {
      toast(`Task moved to ${newStatus.replace('_', ' ')}`);
      fetchAndRenderTasks();
    }
  } catch { toast('Error moving task', 'error'); }
}

async function editTask(id) {
  const task = S.allTasks.find(t => t._id === id);
  if (!task) return;
  
  // Populate form for edit
  document.getElementById('taskId').value = task._id;
  document.getElementById('taskModalTitle').textContent = 'Edit Task';
  document.getElementById('taskSaveBtnText').textContent = 'Update Task';
  document.getElementById('taskTitle').value = task.title;
  document.getElementById('taskDesc').value = task.description || '';
  document.getElementById('taskPriority').value = task.priority;
  document.getElementById('taskStatus').value = task.status;
  document.getElementById('taskCategory').value = task.category;
  document.getElementById('taskDueDate').value = task.dueDate ? task.dueDate.split('T')[0] : '';
  
  // Populate assignee dropdown
  const assigneeSelect = document.getElementById('taskAssignedTo');
  assigneeSelect.innerHTML = '<option value="">Unassigned</option>';
  S.teamMembers.forEach(m => {
    assigneeSelect.innerHTML += `<option value="${m._id}" data-name="${m.name || ''}" data-username="${m.username}">${m.name || m.username}</option>`;
  });
  assigneeSelect.value = task.assignedTo?.userId || '';
  
  openModal('taskModal');
}

async function saveTask() {
  const taskId = document.getElementById('taskId').value;
  const isEdit = !!taskId;
  
  const assigneeSelect = document.getElementById('taskAssignedTo');
  const assigneeOption = assigneeSelect.options[assigneeSelect.selectedIndex];
  const assignedTo = assigneeSelect.value ? {
    userId: assigneeSelect.value,
    name: assigneeOption.dataset.name || '',
    username: assigneeOption.dataset.username
  } : null;
  
  const body = {
    title: document.getElementById('taskTitle').value,
    description: document.getElementById('taskDesc').value,
    priority: document.getElementById('taskPriority').value,
    status: document.getElementById('taskStatus').value,
    category: document.getElementById('taskCategory').value,
    dueDate: document.getElementById('taskDueDate').value || undefined,
    assignedTo
  };
  
  if (!body.title) { toast('Title is required', 'error'); return; }
  
  try {
    let r;
    if (isEdit) {
      r = await api(`/api/tasks/${taskId}`, { method: 'PUT', body: JSON.stringify(body) });
    } else {
      r = await api('/api/tasks', { method: 'POST', body: JSON.stringify(body) });
    }
    
    if (r.success) { 
      closeModal('taskModal'); 
      toast(isEdit ? 'Task updated' : 'Task created'); 
      fetchAndRenderTasks(); 
    }
    else toast(r.error || 'Error', 'error');
  } catch { toast(isEdit ? 'Error updating task' : 'Error creating task', 'error'); }
}

async function undoCompleteTask(id) {
  try {
    const r = await api(`/api/tasks/${id}/undo`, { method: 'POST' });
    if (r.success) { 
      toast('Task restored to previous status'); 
      fetchAndRenderTasks(); 
    }
    else toast(r.error || 'Error', 'error');
  } catch { toast('Error undoing completion', 'error'); }
}

function viewTask(id) {
  editTask(id);
}

// ── TEAM ──
async function loadTeam() {
  const sec = document.getElementById('sec-team');
  sec.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;">
      <h2 style="font-size:1.1rem;font-weight:600;">Team Management</h2>
      <button class="btn btn-gold" onclick="openModal('teamModal')"><i class="fas fa-user-plus"></i> Add Member</button>
    </div>
    <div class="card">
      <div class="card-body no-pad">
        <table class="data-table">
          <thead><tr><th>User</th><th>Username</th><th>Email</th><th>Role</th><th>Last Login</th><th>Status</th><th></th></tr></thead>
          <tbody id="teamBody"><tr><td colspan="7"><div class="loading"><div class="spinner"></div></div></td></tr></tbody>
        </table>
      </div>
    </div>
  `;
  try {
    const data = await api('/api/admin/');
    const admins = data.data || [];
    const tbody = document.getElementById('teamBody');
    if (!admins.length) { tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><i class="fas fa-users"></i><p>No team members</p></div></td></tr>`; return; }
    tbody.innerHTML = admins.map(a => `
      <tr>
        <td>
          <div style="display:flex;align-items:center;gap:0.75rem;">
            <div class="team-avatar">${(a.name || a.username).charAt(0).toUpperCase()}</div>
            <div><div class="cell-primary">${a.name || '-'}</div></div>
          </div>
        </td>
        <td style="font-size:0.85rem;">${a.username}</td>
        <td style="font-size:0.82rem;color:var(--text-muted);">${a.email || '-'}</td>
        <td>${statusBadge(a.role)}</td>
        <td style="font-size:0.78rem;color:var(--text-muted);">${a.lastLogin ? timeAgo(a.lastLogin) : 'Never'}</td>
        <td>${a.isActive ? '<span class="badge badge-active">Active</span>' : '<span class="badge badge-inactive">Inactive</span>'}</td>
        <td>
          ${a._id !== S.adminId ? `<button class="btn btn-danger-ghost btn-sm btn-icon" onclick="deactivateAdmin('${a._id}')" title="Deactivate"><i class="fas fa-user-slash"></i></button>` : '<em style="font-size:0.75rem;color:var(--text-muted);">You</em>'}
        </td>
      </tr>
    `).join('');
  } catch { sec.innerHTML = `<div class="empty-state"><i class="fas fa-users"></i><p>Failed to load team</p></div>`; }
}

async function saveTeamMember() {
  const body = {
    username: document.getElementById('teamUsername').value,
    password: document.getElementById('teamPassword').value,
    name: document.getElementById('teamName').value,
    email: document.getElementById('teamEmail').value,
    role: document.getElementById('teamRole').value
  };
  if (!body.username || !body.password) { toast('Username and password required', 'error'); return; }
  try {
    const r = await api('/api/admin/create', { method: 'POST', body: JSON.stringify(body) });
    if (r.success) { closeModal('teamModal'); toast('Team member created'); loadTeam(); }
    else toast(r.error || 'Error', 'error');
  } catch { toast('Error creating member', 'error'); }
}

async function deactivateAdmin(id) {
  if (!confirm('Deactivate this admin?')) return;
  const r = await api(`/api/admin/${id}`, { method: 'DELETE' });
  if (r.success) { toast('Admin deactivated'); loadTeam(); }
  else toast('Error', 'error');
}

// ── INIT ──
S.adminId = localStorage.getItem('adminId');

if (!S.token) {
  renderLogin();
} else {
  renderApp();
}
</script>
</body>
</html>
